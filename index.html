<script>
// =====================
// DRAW ENGINE
// =====================
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');
const CANVAS_SIZE = 400;
canvas.width = CANVAS_SIZE;
canvas.height = CANVAS_SIZE;

ctx.fillStyle = 'white';
ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

let drawing = false;
let currentTool = 'pen';
let currentColor = '#222222';
let brushSize = 5;
let strokeCount = 0;
let colorSet = new Set(['#ffffff']);
let totalPixels = 0;

// Undo/redo history (store canvas snapshots)
const HISTORY_MAX = 30;
let undoStack = [];
let redoStack = [];

function saveHistory() {
  undoStack.push(canvas.toDataURL());
  if (undoStack.length > HISTORY_MAX) undoStack.shift();
  redoStack = []; // clear redo on new action
  updateUndoRedoBtns();
}

function undoCanvas() {
  if (undoStack.length === 0) return;
  redoStack.push(canvas.toDataURL());
  const prev = undoStack.pop();
  const img = new Image();
  img.onload = () => { ctx.clearRect(0,0,CANVAS_SIZE,CANVAS_SIZE); ctx.drawImage(img,0,0); };
  img.src = prev;
  updateUndoRedoBtns();
  updateEffort();
}

function redoCanvas() {
  if (redoStack.length === 0) return;
  undoStack.push(canvas.toDataURL());
  const next = redoStack.pop();
  const img = new Image();
  img.onload = () => { ctx.clearRect(0,0,CANVAS_SIZE,CANVAS_SIZE); ctx.drawImage(img,0,0); };
  img.src = next;
  updateUndoRedoBtns();
  updateEffort();
}

function updateUndoRedoBtns() {
  const u = document.getElementById('undoBtn');
  const r = document.getElementById('redoBtn');
  if (u) u.style.opacity = undoStack.length > 0 ? '1' : '0.3';
  if (r) r.style.opacity = redoStack.length > 0 ? '1' : '0.3';
}

const COLORS = ['#222222','#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#ffffff','#94a3b8','#92400e','#064e3b'];

const palette = document.getElementById('colorPalette');
COLORS.forEach(c => {
  const btn = document.createElement('div');
  btn.className = 'color-btn' + (c === currentColor ? ' active' : '');
  btn.style.background = c;
  btn.style.border = c === '#ffffff' ? '2px solid #aaa' : '';
  btn.onclick = () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentColor = c;
    setTool('pen');
  };
  palette.appendChild(btn);
});

document.getElementById('sizeSlider').oninput = e => brushSize = +e.target.value;

function setTool(t) {
  currentTool = t;
  document.getElementById('penBtn').classList.toggle('active', t === 'pen');
  document.getElementById('eraserBtn').classList.toggle('active', t === 'eraser');
  document.getElementById('bucketBtn').classList.toggle('active', t === 'bucket');
  // Show/hide size slider - not needed for bucket
  document.getElementById('sizeSlider').style.opacity = t === 'bucket' ? '0.3' : '1';
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = CANVAS_SIZE / rect.width;
  const scaleY = CANVAS_SIZE / rect.height;
  if (e.touches) {
    return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY };
  }
  return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
}

function startDraw(e) {
  e.preventDefault();
  const p = getPos(e);
  if (currentTool === 'bucket') {
    saveHistory();
    floodFill(Math.round(p.x), Math.round(p.y), currentColor);
    colorSet.add(currentColor);
    totalPixels += 500;
    updateEffort();
    return;
  }
  saveHistory();
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  strokeCount++;
  updateEffort();
}

// ---- FLOOD FILL ----
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r, g, b, 255];
}

function colorsMatch(data, idx, target, tolerance = 32) {
  return Math.abs(data[idx]   - target[0]) <= tolerance &&
         Math.abs(data[idx+1] - target[1]) <= tolerance &&
         Math.abs(data[idx+2] - target[2]) <= tolerance &&
         Math.abs(data[idx+3] - target[3]) <= tolerance;
}

function floodFill(startX, startY, fillColorHex) {
  const imgData = ctx.getImageData(0, 0, CANVAS_SIZE, CANVAS_SIZE);
  const data = imgData.data;
  const fillColor = hexToRgb(fillColorHex);

  const startIdx = (startY * CANVAS_SIZE + startX) * 4;
  const targetColor = [data[startIdx], data[startIdx+1], data[startIdx+2], data[startIdx+3]];

  // Already the same color? bail
  if (colorsMatch(targetColor, 0, fillColor, 4)) return;

  const visited = new Uint8Array(CANVAS_SIZE * CANVAS_SIZE);
  const queue = [startX + startY * CANVAS_SIZE];
  visited[startX + startY * CANVAS_SIZE] = 1;

  while (queue.length > 0) {
    const pos = queue.pop();
    const x = pos % CANVAS_SIZE;
    const y = (pos - x) / CANVAS_SIZE;
    const idx = pos * 4;

    // Paint this pixel
    data[idx]   = fillColor[0];
    data[idx+1] = fillColor[1];
    data[idx+2] = fillColor[2];
    data[idx+3] = 255;

    // Check 4 neighbors
    const neighbors = [];
    if (x > 0)            neighbors.push(pos - 1);
    if (x < CANVAS_SIZE-1) neighbors.push(pos + 1);
    if (y > 0)            neighbors.push(pos - CANVAS_SIZE);
    if (y < CANVAS_SIZE-1) neighbors.push(pos + CANVAS_SIZE);

    for (const n of neighbors) {
      if (!visited[n] && colorsMatch(data, n * 4, targetColor)) {
        visited[n] = 1;
        queue.push(n);
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

function doDraw(e) {
  e.preventDefault();
  if (!drawing) return;
  const p = getPos(e);
  ctx.lineWidth = currentTool === 'eraser' ? brushSize * 3 : brushSize;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = currentTool === 'eraser' ? 'white' : currentColor;
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  if (currentTool === 'pen') {
    colorSet.add(currentColor);
    totalPixels += brushSize;
  }
  updateEffort();
}

function stopDraw(e) { e.preventDefault(); drawing = false; }

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', doDraw);
canvas.addEventListener('mouseup', stopDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', doDraw, { passive: false });
canvas.addEventListener('touchend', stopDraw, { passive: false });

function clearCanvas() {
  saveHistory();
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
  strokeCount = 0;
  colorSet = new Set(['#ffffff']);
  totalPixels = 0;
  updateEffort();
}

function calcEffortScore() {
  const strokeScore = Math.min(strokeCount / 50, 1) * 35;
  const colorScore = Math.min((colorSet.size - 1) / 6, 1) * 30;
  const pixelScore = Math.min(totalPixels / 5000, 1) * 35;
  return Math.round(strokeScore + colorScore + pixelScore);
}

function updateEffort() {
  const score = calcEffortScore();
  document.getElementById('effortFill').style.width = score + '%';
  const tip = document.getElementById('effortTip');
  if (score < 20) {
    tip.textContent = 'もっと描き込もう！（20ポイント以上でキャラ生成）';
    tip.className = 'effort-tip warn';
  } else if (score < 50) {
    tip.textContent = '✨ いい感じ！もっと描けばレアになるかも！';
    tip.className = 'effort-tip';
  } else if (score < 80) {
    tip.textContent = '🔥 すごい！レアかエピックが出そう！';
    tip.className = 'effort-tip';
  } else {
    tip.textContent = '⭐ 最高！レジェンダリーの予感！！';
    tip.className = 'effort-tip';
  }
}

}

// EXP needed to level up: base × level² (quadratic curve)
// Lv1→2: base×1, Lv5→6: base×25, Lv10→11: base×100
// Example RARE (base=80): Lv1=80, Lv5=2000, Lv10=8000
const RARITY_EXP = {
  COMMON: 20, UNCOMMON: 30, RARE: 45, EPIC: 65, LEGENDARY: 100
};

// Helper: EXP needed for a single level-up at given level
function expToNextLevel(rarity, lv) {
  const base = RARITY_EXP[rarity] || 30;
  return Math.floor(base * lv * lv);
}

function isInParty(id) { return party.some(p => p && p.id === id); }

function toggleParty(collIdx) {
  const char = collection[collIdx];
  const inParty = party.findIndex(p => p && p.id === char.id);
  if (inParty >= 0) {
    party[inParty] = null;
  } else {
    const empty = party.findIndex(p => !p);
    if (empty >= 0) party[empty] = char;
    else { alert('パーティーがいっぱいです！'); return; }
  }
  localStorage.setItem('egami_party', JSON.stringify(party));
  renderCollection();
  renderParty();
  checkSynergy();
}

function checkSynergy() {
  const active = party.filter(Boolean);
  const banner = document.getElementById('synergyBanner');
  if (active.length < 2) { banner.classList.remove('show'); return; }

  const elements = active.map(c => c.element);
  const elementCount = {};
  elements.forEach(e => elementCount[e] = (elementCount[e] || 0) + 1);

  const synergies = [];
  Object.entries(elementCount).forEach(([el, cnt]) => {
    if (cnt >= 3) synergies.push(`${el}×${cnt}: こうげき力+30%🔥`);
    else if (cnt >= 2) synergies.push(`${el}×${cnt}: こうげき力+15%✨`);
  });

  const classes = active.map(c => c.class);
  if (classes.includes('ヒーラー') && classes.includes('ディフェンダー')) synergies.push('鉄壁コンボ: ぼうぎょ+20%🛡️');
  if (classes.filter(c => c === 'アタッカー').length >= 2) synergies.push('ダブルアタック: 会心率UP⚔️');

  if (synergies.length > 0) {
    banner.textContent = '✨ シナジー: ' + synergies.join(' / ');
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

let selectedStageId = 0;
let clearedStages = JSON.parse(localStorage.getItem('egami_cleared') || '[]');
let currentWaveIdx = 0;
let currentStageWaves = [];

function renderStageMap() {
  const list = document.getElementById('stageList');
  list.innerHTML = '';
  STAGES.forEach((stage, i) => {
    const cleared = clearedStages.includes(stage.id);
    const locked = i > 0 && !clearedStages.includes(STAGES[i-1].id);
    const isSelected = selectedStageId === stage.id;

    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'stage-connector' + (clearedStages.includes(STAGES[i-1].id) ? ' cleared' : '');
      list.appendChild(conn);
    }

    const card = document.createElement('div');
    card.className = `stage-card${locked?' locked':''}${cleared?' cleared':''}${stage.isBoss?' boss-stage':''}${isSelected?' selected-stage':''}`;
    card.innerHTML = `
      <div class="stage-num">${locked ? '🔒' : stage.icon}</div>
      <div class="stage-info">
        <div class="stage-name">${stage.name}</div>
        <div class="stage-desc">${stage.desc}</div>
        <div class="stage-enemies">${stage.waves[stage.waves.length-1].map(e => `<span class="enemy-pip">${e.icon}</span>`).join('')}</div>
      </div>
      <div class="stage-right">
        ${stage.isBoss ? '<span class="stage-badge boss">BOSS</span>' : ''}
        ${cleared ? '<span class="stage-badge clear">✓クリア</span>' : ''}
        ${!cleared && !locked && !stage.isBoss ? '<span class="stage-badge new">NEW</span>' : ''}
      </div>
    `;
    if (!locked) {
      card.onclick = () => selectStage(stage.id);
    }
    list.appendChild(card);
  });
}

function selectStage(id) {
  selectedStageId = id;
  renderStageMap();
  const stage = STAGES.find(s => s.id === id);
  const panel = document.getElementById('weaknessPanel');
  const rows = document.getElementById('weaknessRows');
  if (stage.isBoss && stage.weaknesses) {
    rows.innerHTML = stage.weaknesses.map(w => `
      <div class="weakness-row"><span class="weakness-icon">${w.icon}</span><span class="weakness-text">${w.text}</span></div>
    `).join('');
    panel.classList.add('show');
  } else {
    panel.classList.remove('show');
  }
  const filled = party.filter(Boolean).length;
  document.getElementById('battleStartBtn').disabled = filled === 0;
  document.getElementById('battleStartBtn').textContent = `🔥 ${stage.name} にちょうせん！`;
}

let battleState = null;

function startBattle() {
  const stage = STAGES.find(s => s.id === selectedStageId);
  if (!stage) return;

  currentStageWaves = stage.waves.map(wave =>
    wave.map(e => ({ ...e, currentHp: e.hp, maxHp: e.hp }))
  );
  currentWaveIdx = 0;

  showBattleSplash(() => {
    if (stage.isBoss) {
      showBossEntry(stage, () => launchWave(stage));
    } else {
      launchWave(stage);
    }
  });
}

function showBossEntry(stage, cb) {
  const overlay = document.getElementById('bossEntryOverlay');
  document.getElementById('bossEntryIcon').textContent = stage.bossIcon;
  document.getElementById('bossEntryName').textContent = stage.bossName;
  document.getElementById('bossEntrySub').textContent = stage.bossTitle + ' があらわれた！';
  overlay.classList.add('show');
  spawnShockwaves(2);
  flashScreen('rgba(239,68,68,0.4)', 600);
  setTimeout(() => {
    overlay.classList.remove('show');
    cb();
  }, 2800);
}

function launchWave(stage) {
  const playerTeam = party.filter(Boolean).map(c => ({ ...c, currentHp: c.hp, maxHp: c.hp, buffs: {} }));
  const enemyWave = currentStageWaves[currentWaveIdx].map(e => ({ ...e }));

  battleState = {
    stage,
    player: playerTeam,
    enemy: enemyWave,
    turn: 0,
    running: true,
    waveIdx: currentWaveIdx,
    totalWaves: stage.waves.length,
  };

  const isBossWave = stage.isBoss && currentWaveIdx === stage.waves.length - 1;
  document.getElementById('waveBadge').textContent = `WAVE ${currentWaveIdx+1}/${stage.waves.length}`;
  document.getElementById('battleTitle').textContent = isBossWave ? '💀 BOSS BATTLE！' : '⚔️ バトル！';

  // Boss HP bar
  const bossWrap = document.getElementById('bossHpWrap');
  if (isBossWave) {
    const boss = enemyWave.find(e => e.isBoss);
    if (boss) {
      document.getElementById('bossHpName').textContent = `👹 ${boss.name}`;
      document.getElementById('bossHpVal').textContent = `${boss.currentHp} / ${boss.maxHp}`;
      document.getElementById('bossHpFill').style.width = '100%';
      bossWrap.classList.add('show');
    }
  } else {
    bossWrap.classList.remove('show');
  }

  document.getElementById('stageClearBanner').classList.remove('show');
  document.getElementById('battleNextBtn').style.display = 'none';
  document.getElementById('battleEndBtn').style.display = 'none';
  document.getElementById('battleResultBanner').innerHTML = '';
  document.getElementById('battleLog').innerHTML = '';

  renderBattleField();
  document.getElementById('battleScreen').classList.add('show');

  const intro = isBossWave
    ? `💀 ${stage.bossName || 'ボス'} があらわれた！全力で戦え！`
    : `🔥 ウェーブ ${currentWaveIdx+1} かいし！`;
  addLog(intro, 'highlight');

  setTimeout(() => runBattleTick(), 1200);
}

// Element advantage table
const ELEMENT_ADV = {
  '炎': { strong: '木', weak: '水' },
  '水': { strong: '炎', weak: '木' },
  '木': { strong: '水', weak: '炎' },
  '光': { strong: '闇', weak: '闇' },
  '闇': { strong: '光', weak: '光' },
  '雷': { strong: '水', weak: '木' },
  '風': { strong: '木', weak: '炎' },
};

function getElementMult(attackerEl, defenderEl) {
  const adv = ELEMENT_ADV[attackerEl];
  if (!adv) return 1;
  if (adv.strong === defenderEl) return 1.5;
  if (adv.weak === defenderEl) return 0.7;
  return 1;
}

// Synergy bonuses for player
function calcSynergyBonus(player) {
  const active = player.filter(p => p.currentHp > 0);
  let atkMult = 1, defMult = 1, healBonus = 0;
  const elements = active.map(p => p.element);
  const classes = active.map(p => p.class);
  const elCount = {};
  elements.forEach(e => elCount[e] = (elCount[e]||0)+1);
  Object.entries(elCount).forEach(([el, cnt]) => {
    if (cnt >= 4) atkMult += 0.4;
    else if (cnt >= 3) atkMult += 0.3;
    else if (cnt >= 2) atkMult += 0.15;
  });
  if (classes.includes('ヒーラー') && classes.includes('ディフェンダー')) defMult += 0.2;
  if (classes.filter(c=>c==='アタッカー').length >= 2) atkMult += 0.1;
  if (classes.includes('ヒーラー')) healBonus = 15;
  return { atkMult, defMult, healBonus };
}

async function runBattleTick() {
  if (!battleState || !battleState.running) return;
  const { player, enemy, stage } = battleState;
  const isBossWave = stage.isBoss && battleState.waveIdx === stage.waves.length - 1;
  const synergy = calcSynergyBonus(player);

  const allFighters = [
    ...player.map((f,i) => ({ ...f, team:'player', idx:i })),
    ...enemy.map((f,i) => ({ ...f, team:'enemy', idx:i }))
  ].filter(f => f.currentHp > 0).sort((a,b) => b.speed - a.speed);

  for (const attacker of allFighters) {
    if (!battleState.running) return;
    await new Promise(r => setTimeout(r, 550));

    // Healer heal action (player only)
    if (attacker.team === 'player' && attacker.class === 'ヒーラー') {
      const hurt = player.filter(p => p.currentHp > 0 && p.currentHp < p.maxHp);
      if (hurt.length > 0) {
        const target = hurt.sort((a,b) => a.currentHp - b.currentHp)[0];
        const heal = Math.round(20 + attacker.attack * 0.4 + synergy.healBonus);
        target.currentHp = Math.min(target.maxHp, target.currentHp + heal);
        const tidx = player.indexOf(target);
        const el = document.getElementById(`player_${tidx}`)?.querySelector('.fighter-img');
        if (el) { el.style.boxShadow='0 0 15px #34d399'; setTimeout(()=>el.style.boxShadow='',600); }
        addLog(`💚 ${attacker.name} が ${target.name} を ${heal} かいふく！`, 'highlight');
        renderBattleField();
        continue;
      }
    }

    const targetTeam = attacker.team === 'player' ? enemy : player;
    const aliveTargets = targetTeam.filter(t => t.currentHp > 0);
    if (aliveTargets.length === 0) break;

    // Enemy AI: target lowest HP player
    const target = attacker.team === 'enemy'
      ? aliveTargets.sort((a,b) => a.currentHp - b.currentHp)[0]
      : aliveTargets[Math.floor(Math.random() * aliveTargets.length)];
    const targetIdx = targetTeam.indexOf(target);

    // Boss special attack at 50% HP
    if (attacker.isBoss && attacker.specialAttack && !attacker.specialAttack.used
        && attacker.currentHp / attacker.maxHp <= attacker.specialAttack.threshold) {
      attacker.specialAttack.used = true;
      addLog(`💥💥 ${attacker.name} の ${attacker.specialAttack.name}！！全員に大ダメージ！！`, 'critical');
      flashScreen('rgba(239,68,68,0.5)', 400);
      spawnShockwaves(1);
      for (let pi = 0; pi < player.length; pi++) {
        if (player[pi].currentHp > 0) {
          const splashDmg = Math.round(attacker.attack * 0.8);
          player[pi].currentHp = Math.max(0, player[pi].currentHp - splashDmg);
          showDamagePopup(false, pi, splashDmg, '#ef4444');
        }
      }
      renderBattleField();
      await new Promise(r => setTimeout(r, 800));
      if (player.every(p => p.currentHp <= 0)) { battleLose(); return; }
      continue;
    }

    const elemMult = attacker.team === 'player'
      ? getElementMult(attacker.element, target.element)
      : getElementMult(attacker.element, target.element);
    const atkMult = attacker.team === 'player' ? synergy.atkMult : 1;
    const defMult = attacker.team === 'enemy' && target.team === 'player' ? (1/synergy.defMult) : 1;

    // Stone bonuses for player
    const stoneMults = attacker.team === 'player' ? getStoneMultipliers(attacker) : { atkMult: 1, critBonus: 0, healBonus: 0 };
    const finalAtkMult = atkMult * stoneMults.atkMult;
    const critChance = (attacker.luck || 20) + stoneMults.critBonus;

    // Water shield heal on turn start for player
    if (attacker.team === 'player' && stoneMults.healBonus > 0 && attacker.currentHp > 0) {
      attacker.currentHp = Math.min(attacker.maxHp || attacker.hp, attacker.currentHp + stoneMults.healBonus);
      renderBattleField();
    }

    const isCrit = Math.random() * 100 < critChance;
    let dmg = Math.max(1, Math.round(
      attacker.attack * finalAtkMult * (isCrit ? 1.5 : 1) * elemMult * defMult
      - target.defense * 0.5 + Math.random() * 5
    ));

    target.currentHp = Math.max(0, target.currentHp - dmg);

    // Boss HP bar update
    if (isBossWave) {
      const boss = enemy.find(e => e.isBoss);
      if (boss) {
        document.getElementById('bossHpFill').style.width = Math.max(0, boss.currentHp/boss.maxHp*100) + '%';
        document.getElementById('bossHpVal').textContent = `${Math.max(0,boss.currentHp)} / ${boss.maxHp}`;
      }
    }

    const attackerEl = document.getElementById(`${attacker.team}_${attacker.idx}`)?.querySelector('.fighter-img');
    const targetSide = attacker.team === 'player' ? 'enemy' : 'player';
    const targetEl = document.getElementById(`${targetSide}_${targetIdx}`)?.querySelector('.fighter-img');
    if (attackerEl) { attackerEl.classList.add('attacking'); setTimeout(()=>attackerEl.classList.remove('attacking'),350); }
    if (targetEl) { targetEl.classList.add('hurt'); setTimeout(()=>targetEl.classList.remove('hurt'),350); }

    const dmgColor = elemMult > 1 ? '#ff6b35' : elemMult < 1 ? '#60a5fa' : '#fbbf24';
    showDamagePopup(attacker.team === 'player', targetIdx, dmg, dmgColor);

    const elemNote = elemMult > 1 ? '🔥こうかばつぐん！' : elemMult < 1 ? '💧こうかがいまひとつ…' : '';
    const logMsg = isCrit
      ? `💥 ${attacker.name} のクリティカル！ ${target.name} に ${dmg} ダメージ！${elemNote}`
      : `⚔️ ${attacker.name} → ${target.name} に ${dmg} ダメージ ${elemNote}`;
    addLog(logMsg, isCrit ? 'critical' : elemMult > 1 ? 'highlight' : '');

    renderBattleField();

    if (enemy.every(e => e.currentHp <= 0)) {
      await new Promise(r => setTimeout(r, 800));
      waveCleared(); return;
    }
    if (player.every(p => p.currentHp <= 0)) {
      await new Promise(r => setTimeout(r, 800));
      battleLose(); return;
    }
  }

  battleState.turn++;
  if (battleState.running) setTimeout(() => runBattleTick(), 300);
}

function waveCleared() {
  battleState.running = false;
  const { stage, waveIdx, totalWaves } = battleState;
  const expGain = 15 + (waveIdx + 1) * 8 + (stage.isBoss ? 30 : 0);

  if (waveIdx + 1 >= totalWaves) {
    // Stage clear
    if (!clearedStages.includes(stage.id)) {
      clearedStages.push(stage.id);
      localStorage.setItem('egami_cleared', JSON.stringify(clearedStages));
    }
    const totalExp = expGain * totalWaves;
    const levelUps = giveExp(totalExp);
    const drops = rollDrops(stage, stage.isBoss);

    if (stage.isBoss) {
      spawnBeams(12, '#fbbf24');
      spawnParticles(60, ['#fbbf24','#ff6b35','#ff4da6'], 10, 2);
    } else {
      spawnParticles(25, ['#34d399','#fbbf24'], 7, 1.5);
    }

    document.getElementById('battleEndBtn').style.display = 'block';
    // Show reward after short delay
    setTimeout(() => showRewardOverlay(stage, stage.isBoss, levelUps, totalExp, drops), 1200);
  } else {
    addLog(`✅ ウェーブ ${waveIdx+1} クリア！次のウェーブへ…`, 'highlight');
    giveExp(expGain);
    currentWaveIdx = waveIdx + 1;
    battleState.player.forEach(p => {
      if (p.currentHp > 0) p.currentHp = Math.min(p.maxHp, p.currentHp + Math.round(p.maxHp * 0.2));
    });
    document.getElementById('battleNextBtn').style.display = 'block';
    document.getElementById('battleNextBtn').textContent = `➡️ ウェーブ ${currentWaveIdx+1} へ！`;
  }
}

function giveExp(amount) {
  const levelUps = [];
  party.filter(Boolean).forEach(c => {
    c.exp = (c.exp || 0) + amount;
    let needed = expToNextLevel(c.rarity, c.level);
    while (c.exp >= needed) {
      const oldLv = c.level;
      c.exp -= needed;
      c.level++;
      const statUps = applyLevelUpStats(c);
      levelUps.push({ ...c, oldLv, statUps });
      showLevelUpFlash(c.name);
      addLog(`⬆️ ${c.name} がLv.${c.level}になった！ ${statUps.join(', ')}`, 'highlight');
      needed = expToNextLevel(c.rarity, c.level);
    }
  });
  const SYNC_STATS = ['level','exp','hp','attack','defense','speed','luck','ap','evoLevels','equippedStones'];
  collection.forEach(c => {
    const match = party.find(p => p && p.id === c.id);
    if (match) SYNC_STATS.forEach(s => { if (match[s] !== undefined) c[s] = match[s]; });
  });
  localStorage.setItem('egami_party', JSON.stringify(party));
  localStorage.setItem('egami_collection', JSON.stringify(collection));
  return levelUps;
}

function applyLevelUpStats(char) {
  const ups = [];
  const grow = (stat, base, label) => {
    const gain = Math.ceil(base * (0.05 + Math.random() * 0.08));
    char[stat] = (char[stat] || base) + gain;
    ups.push(`${label}+${gain}`);
  };
  grow('hp',     char.hp,      'HP');
  grow('attack', char.attack,  'ATK');
  grow('defense',char.defense, 'DEF');
  if (char.level % 3 === 0) grow('speed', char.speed, 'SPD');
  if (char.level % 5 === 0) grow('luck',  char.luck,  'LCK');
  return ups;
}

  const flash = document.getElementById('levelupFlash');
  document.getElementById('levelupCharName').textContent = charName;
  flash.classList.remove('show');
  void flash.offsetWidth; // reflow
  flash.classList.add('show');

}

function nextWave() {
  document.getElementById('battleNextBtn').style.display = 'none';
  const stage = STAGES.find(s => s.id === selectedStageId);
  const prevPlayer = battleState.player; // preserve HP from last wave
  const enemyWave = currentStageWaves[currentWaveIdx].map(e => ({ ...e }));

  battleState = {
    stage,
    player: prevPlayer,
    enemy: enemyWave,
    turn: 0,
    running: true,
    waveIdx: currentWaveIdx,
    totalWaves: stage.waves.length,
  };

  const isBossWave = stage.isBoss && currentWaveIdx === stage.waves.length - 1;
  document.getElementById('waveBadge').textContent = `WAVE ${currentWaveIdx+1}/${stage.waves.length}`;
  document.getElementById('battleTitle').textContent = isBossWave ? '💀 BOSS BATTLE！' : '⚔️ バトル！';

  if (isBossWave) {
    document.getElementById('bossHpWrap').classList.add('show');
    const boss = enemyWave.find(e => e.isBoss);
    if (boss) {
      document.getElementById('bossHpName').textContent = `👹 ${boss.name}`;
      document.getElementById('bossHpVal').textContent = `${boss.currentHp} / ${boss.maxHp}`;
      document.getElementById('bossHpFill').style.width = '100%';
    }
    showBossEntry(stage, () => {
      renderBattleField();
      addLog('💀 ボスの間に踏み込んだ…！', 'critical');
      setTimeout(() => runBattleTick(), 1200);
    });
  } else {
    renderBattleField();
    addLog(`🔥 ウェーブ ${currentWaveIdx+1} かいし！`, 'highlight');
    setTimeout(() => runBattleTick(), 800);
  }
}

function battleLose() {
  battleState.running = false;

  document.getElementById('battleResultBanner').innerHTML = '<div class="battle-result-banner lose">💀 まけた...</div>';

function endBattle() {

  document.getElementById('battleEndBtn').style.display = 'none';

function updatePointDisplay() {

  const bp = document.getElementById('battlePtsVal');
  if (dp) dp.textContent = points.draw;
  if (bp) bp.textContent = points.battle;
}

function addToInventory(dropId) {
  const existing = inventory.find(i => i.id === dropId);
  if (existing) existing.count = (existing.count || 1) + 1;
  else inventory.push({ id: dropId, count: 1 });
  saveInventory();
}

function rollDrops(stage, isBoss) {
  const drops = [];
  if (isBoss) {
    // Roll each boss drop item
    BOSS_DROP_TABLE.forEach(item => {
      const rate = DROP_RATES[item.rarity] || 0;
      if (Math.random() < rate) drops.push(item);
    });
    // Guarantee at least 1 common/uncommon on first boss clear
    if (drops.length === 0) {
      const commons = BOSS_DROP_TABLE.filter(i => i.rarity === 'COMMON' || i.rarity === 'UNCOMMON');
      drops.push(commons[Math.floor(Math.random() * commons.length)]);
    }
    drops.forEach(d => addToInventory(d.id));
  } else if (stage && STAGE_DROPS[stage.id]) {
    // Fixed pool for normal stages, 60% chance each
    STAGE_DROPS[stage.id].forEach(id => {
      if (Math.random() < 0.6) {
        const item = BOSS_DROP_TABLE.find(i => i.id === id);
        if (item) { drops.push(item); addToInventory(id); }
      }
    });
  }
  return drops;
}

function renderEvoSection(c) {
  const evoLv = getEvoLevel(c.level);
  // Progress nodes
  const nodes = [
    { lv: 1,  icon: '🥚', label: 'はじめ', reached: true, cls: '' },
    { lv: 10, icon: '🌱', label: 'Lv10', reached: c.level >= 10, cls: 'evo2' },
    { lv: 20, icon: '🌿', label: 'Lv20', reached: c.level >= 20, cls: 'evo2' },
    { lv: 30, icon: '🌟', label: 'Lv30', reached: c.level >= 30, cls: 'evo3' },
  ];
  document.getElementById('evoProgress').innerHTML = nodes.map((n, i) => `
    ${i > 0 ? `<div class="evo-line ${n.reached ? 'filled' : ''}"></div>` : ''}
    <div class="evo-stage ${n.reached ? 'reached ' + n.cls : ''}" title="Lv${n.lv}">${n.icon}</div>
  `).join('');

  // Next evo target
  const nextEvo = EVO_LEVELS.find(e => e.lv > c.level && e.lv <= 30);
  const maxEvo = evoLv >= 3;
  const canEvo = !maxEvo && c.level >= (EVO_LEVELS[evoLv + 1]?.lv || 999) && !(c.evoLevels || []).includes(evoLv + 1);

  if (maxEvo) {
    document.getElementById('evoDesc').textContent = '✨ 最大進化に達している！すべての力が解放されている。';
    document.getElementById('evoBtn').disabled = true;
    document.getElementById('evoBtn').textContent = '✅ 最大進化済み';
  } else if (canEvo) {
    const next = EVO_LEVELS[evoLv + 1];
    document.getElementById('evoDesc').textContent = `Lv${next.lv}に達した！「${next.label}」へ進化できる！ステータスが${Math.round(next.statBoost * 100)}%アップする！`;
    document.getElementById('evoBtn').disabled = false;
    document.getElementById('evoBtn').textContent = `✨ ${next.label}へしんか！`;
  } else {
    const nextLv = EVO_LEVELS.find(e => e.lv > c.level);
    document.getElementById('evoDesc').textContent = nextLv
      ? `Lv${nextLv.lv}になると進化できる。あと${nextLv.lv - c.level}レベル！`
      : 'さらなる力を求めてバトルを続けよう！';
    document.getElementById('evoBtn').disabled = true;
    document.getElementById('evoBtn').textContent = `🔒 Lv${nextLv?.lv || 30}で進化可能`;
  }
}

function togglePartyFromDetail() {
  if (detailCharIdx === null) return;
  const c = collection[detailCharIdx];
  const inParty = party.findIndex(p => p && p.id === c.id);
  if (inParty >= 0) {
    party[inParty] = null;
  } else {
    const empty = party.findIndex(p => !p);
    if (empty < 0) { alert('パーティーがいっぱいです！'); return; }
    party[empty] = c;
  }
  localStorage.setItem('egami_party', JSON.stringify(party));
  renderCharDetail(c);
}

// ---- EQUIP SYSTEM ----
function openEquipPicker(slot) {
  equipSlotTarget = slot;
  const c = collection[detailCharIdx];
  const otherSlot = slot === 0 ? 1 : 0;
  const otherEquipped = c.equippedStones?.[otherSlot];

  // Available stones = type:stone in inventory
  const stones = inventory.filter(inv => {
    const def = BOSS_DROP_TABLE.find(d => d.id === inv.id);
    return def && def.type === 'stone' && (inv.count || 1) > 0;
  });

  document.getElementById('equipPickerSub').textContent = `スロット ${slot + 1} にそうびするストーンをえらぼう`;
  document.getElementById('equipPickerItems').innerHTML = stones.length === 0
    ? '<div class="inv-empty">スキルストーンがありません。<br>ボスをたおしてゲットしよう！</div>'
    : stones.map(inv => {
        const def = BOSS_DROP_TABLE.find(d => d.id === inv.id);
        const isEquippedOther = otherEquipped === inv.id;
        return `
          <div class="equip-picker-item ${isEquippedOther ? 'equipped' : ''}" onclick="equipStone('${inv.id}')">
            <div style="font-size:1.8rem">${def.icon}</div>
            <div style="flex:1">
              <div style="font-size:0.85rem;font-weight:700">${def.name}
                <span class="drop-item-rarity drop-rarity-${def.rarity}" style="font-size:0.6rem;padding:1px 6px">${RARITY_JP[def.rarity]}</span>
              </div>
              <div style="font-size:0.68rem;color:var(--text-dim)">${def.desc}</div>
            </div>
            <div style="font-size:0.7rem;color:var(--text-dim)">×${inv.count || 1}</div>
          </div>
        `;
      }).join('');

  document.getElementById('equipPicker').classList.add('show');
}

function closeEquipPicker() {
  document.getElementById('equipPicker').classList.remove('show');
}

function equipStone(stoneId) {
  const c = collection[detailCharIdx];
  if (!c.equippedStones) c.equippedStones = [null, null];
  c.equippedStones[equipSlotTarget] = stoneId;
  // Sync to party too
  const partyMatch = party.find(p => p && p.id === c.id);
  if (partyMatch) partyMatch.equippedStones = [...c.equippedStones];
  localStorage.setItem('egami_collection', JSON.stringify(collection));
  localStorage.setItem('egami_party', JSON.stringify(party));
  closeEquipPicker();
  renderEquipSlots(c);
}

function unequipStone(slot) {
  const c = collection[detailCharIdx];
  if (!c.equippedStones) return;
  c.equippedStones[slot] = null;
  const partyMatch = party.find(p => p && p.id === c.id);
  if (partyMatch) partyMatch.equippedStones = [...c.equippedStones];
  localStorage.setItem('egami_collection', JSON.stringify(collection));
  localStorage.setItem('egami_party', JSON.stringify(party));
  renderEquipSlots(c);
}

// ---- STONE EFFECTS IN BATTLE ----
// Called in runBattleTick to apply stone bonuses
function getStoneMultipliers(char) {
  const stones = char.equippedStones || [];
  let atkMult = 1, critBonus = 0, healBonus = 0, speedDebuff = 0;
  stones.forEach(sid => {
    if (!sid) return;
    if (sid === 'stone_dark_slash'   && char.element === '闇') atkMult += 0.30;
    if (sid === 'stone_fire_burst'   && char.element === '炎') atkMult += 0.20;
    if (sid === 'stone_light_aurora' && char.element === '光') critBonus += 25;
    if (sid === 'stone_water_shield' && char.element === '水') healBonus += 8;
    if (sid === 'stone_zorgan_wrath') atkMult += 0.15; // universal bonus
    if (sid === 'stone_shadow_veil')  speedDebuff += 10; // handled separately
  });
  return { atkMult, critBonus, healBonus };
}

// ---- EVOLUTION SYSTEM ----
function evolveChar() {
  const c = collection[detailCharIdx];
  const evoLv = getEvoLevel(c.level);
  const nextEvoData = EVO_LEVELS[evoLv + 1];
  if (!nextEvoData || c.level < nextEvoData.lv) return;

  // Apply stat boost
  const boost = nextEvoData.statBoost;
  ['hp','attack','defense','speed','luck','ap'].forEach(stat => {
    if (c[stat]) c[stat] = Math.round(c[stat] * (1 + boost));
  });
  // Mark evolved
  if (!c.evoLevels) c.evoLevels = [];
  c.evoLevels.push(evoLv + 1);

  // Sync party
  const partyMatch = party.find(p => p && p.id === c.id);
  if (partyMatch) Object.assign(partyMatch, { hp: c.hp, attack: c.attack, defense: c.defense, speed: c.speed, luck: c.luck, ap: c.ap, evoLevels: c.evoLevels });

  localStorage.setItem('egami_collection', JSON.stringify(collection));
  localStorage.setItem('egami_party', JSON.stringify(party));

  // Show evolution animation
  showEvoAnim(c, nextEvoData, boost);
}

function showEvoAnim(c, evoData, boost) {
  const overlay = document.getElementById('evoAnimOverlay');
  document.getElementById('evoAnimImg').src = c.imageData;
  const ring = document.getElementById('evoAnimRing');
  ring.style.borderColor = evoData.ringColor;
  ring.style.animation = 'none';
  void ring.offsetWidth;
  ring.style.animation = 'evoRingGrow 2s ease-out forwards';

  document.getElementById('evoAnimText').textContent = `✨ ${evoData.label} しんか！！`;
  document.getElementById('evoAnimText').style.color = evoData.ringColor;
  document.getElementById('evoAnimSub').textContent = `全ステータス +${Math.round(boost * 100)}%！！`;

  spawnParticles(40, [evoData.ringColor, '#ffffff', '#fbbf24'], 8, 1.8);
  spawnBeams(8, evoData.ringColor);
  flashScreen(evoData.ringColor + '80', 600);

  overlay.classList.add('show');
  setTimeout(() => {
    overlay.classList.remove('show');
    renderCharDetail(c);
  }, 3000);
}

function recalcAllStats() {
  // Recalculate stats for all chars based on their current level
  // Uses the original base stats stored at generation time (level 1 equivalent)
  let fixed = 0;
  collection.forEach(c => {
    if (!c.level || c.level <= 1) return;
    // We don't have original stats, so we estimate: apply growth for missing levels
    // Check if stats look "too low" for their level (within 20% of a Lv1 char)
    const expectedMinHp = (c.rarity === 'LEGENDARY' ? 180 : c.rarity === 'EPIC' ? 150 : c.rarity === 'RARE' ? 130 : 100);
    if (c.hp < expectedMinHp && c.level >= 5) {
      // Apply catch-up stat boosts for missing levels
      const missingLevels = c.level - 1;
      for (let i = 0; i < missingLevels; i++) {
        ['hp','attack','defense'].forEach(stat => {
          const gain = Math.ceil((c[stat] || 50) * 0.06);
          c[stat] = (c[stat] || 50) + gain;
        });
      }
      // Sync to party too
      const partyMatch = party.find(p => p && p.id === c.id);
      if (partyMatch) ['hp','attack','defense','speed','luck'].forEach(s => partyMatch[s] = c[s]);
      fixed++;
    }
  });
  localStorage.setItem('egami_collection', JSON.stringify(collection));
  localStorage.setItem('egami_party', JSON.stringify(party));
  if (fixed > 0) {
    alert(`✅ ${fixed}体のステータスを修正しました！`);
  } else {
    alert('ステータスの問題は見つかりませんでした。');
  }
  renderCollection();
}

const BATTLE_IMG_URL = BATTLE_IMG;

function applyBattleImages() {
  const bg = document.querySelector('.splash-bg');
  const battleBg = document.querySelector('.battle-splash-bg');
  if (bg) bg.style.backgroundImage = `url(${BATTLE_IMG_URL})`;
  if (battleBg) battleBg.style.backgroundImage = `url(${BATTLE_IMG_URL})`;
}
document.addEventListener('DOMContentLoaded', applyBattleImages);

function showSplash() {
  const splash = document.getElementById('splashScreen');
  const buttons = document.getElementById('splashButtons');
  const loading = document.getElementById('splashLoading');
  // 背景画像を直接設定
  const bg = splash.querySelector('.splash-bg');
  if (bg) bg.style.backgroundImage = `url(${BATTLE_IMG})`;
  splash.style.display = 'flex';
  setTimeout(() => {
    loading.style.display = 'none';
    buttons.style.display = 'flex';
  }, 1200);
}

function hideSplash() {
  const splash = document.getElementById('splashScreen');
  splash.style.transition = 'opacity 0.5s';
  splash.style.opacity = '0';
  setTimeout(() => splash.style.display = 'none', 500);
}

function splashLogin() {
  hideSplash();
  setTimeout(() => openSettings(), 300);
}

function splashGuest() {
  hideSplash();
}

function showBattleSplash(callback) {
  const el = document.getElementById('battleSplash');
  const bg = el.querySelector('.battle-splash-bg');
  if (bg) bg.style.backgroundImage = `url(${BATTLE_IMG})`;
  el.style.display = 'flex';
  el.style.opacity = '1';
  setTimeout(() => {
    el.style.transition = 'opacity 0.4s';
    el.style.opacity = '0';
    setTimeout(() => {
      el.style.display = 'none';
      el.style.transition = '';
      el.style.opacity = '1';
      if (callback) callback();
    }, 400);
  }, 1200);
}

// { url, key, userId, displayName }

let sbClient = null; // Supabase client instance

function initSupabase() {
  if (!sbConfig.url || !sbConfig.key) return false;
  try {
    // Use Supabase via CDN fetch (no import needed)
    sbClient = {
      url: sbConfig.url.replace(/\/$/, ''),
      key: sbConfig.key,
      headers: {
        'apikey': sbConfig.key,
        'Authorization': `Bearer ${sbConfig.key}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation',
      }
    };
    return true;
  } catch(e) { return false; }
}

async function sbFetch(path, method = 'GET', body = null, extra = {}) {
  if (!sbClient) return null;
  const res = await fetch(`${sbClient.url}/rest/v1${path}`, {
    method,
    headers: { ...sbClient.headers, ...extra },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// Generate or retrieve stable userId
function getUserId() {
  if (!sbConfig.userId) {
    sbConfig.userId = 'user_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
    localStorage.setItem('egami_sb_config', JSON.stringify(sbConfig));
  }
  return sbConfig.userId;
}

function setSyncBadge(state) {
  // state: 'local' | 'online' | 'syncing' | 'error'
  const badge = document.getElementById('syncBadge');
  const map = {
    local:   { text: '💾 ローカル', cls: '' },
    online:  { text: '☁️ 同期済み', cls: 'online' },
    syncing: { text: '🔄 同期中…', cls: 'syncing' },
    error:   { text: '⚠️ エラー', cls: '' },
  };
  const s = map[state] || map.local;
  badge.textContent = s.text;
  badge.className = 'header-sync-badge ' + s.cls;
}

function showSettingsStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = `settings-status show ${type}`;
  if (type !== 'info') setTimeout(() => el.classList.remove('show'), 4000);
}

// ---- CONNECT SUPABASE ----
async function connectSupabase() {
  const url = document.getElementById('inputSupabaseUrl').value.trim();
  const key = document.getElementById('inputSupabaseKey').value.trim();
  const name = document.getElementById('inputDisplayName').value.trim() || 'トレーナー';

  if (!url || !key) { showSettingsStatus('connectionStatus', 'URLとキーを入力してください', 'err'); return; }
  showSettingsStatus('connectionStatus', '🔄 接続テスト中…', 'info');

  sbConfig = { ...sbConfig, url, key, displayName: name };
  sbClient = null;
  initSupabase();

  try {
    // Test connection - try to read from saves table
    await sbFetch('/saves?limit=1');
    sbConfig.userId = getUserId();
    localStorage.setItem('egami_sb_config', JSON.stringify(sbConfig));
    showSettingsStatus('connectionStatus', '✅ 接続成功！データを同期します', 'ok');
    setSyncBadge('online');
    updateProfileUI();
    updateSyncStatusText();
    // Auto-sync after connect
    setTimeout(() => manualSync(), 500);
  } catch(e) {
    showSettingsStatus('connectionStatus', `❌ 接続失敗: ${e.message}`, 'err');
    setSyncBadge('error');
  }
}

// ---- SAVE TO CLOUD ----
async function manualSync() {
  if (!sbConfig.url || !sbConfig.key) {
    if (document.getElementById('settingsOverlay').classList.contains('show')) {
      showSettingsStatus('syncStatus', '⚠️ まずSupabaseに接続してください', 'err');
    }
    return;
  }
  if (!sbClient) initSupabase();
  setSyncBadge('syncing');

  const userId = getUserId();
  const payload = {
    user_id: userId,
    display_name: sbConfig.displayName || 'トレーナー',
    collection: collection,
    party: party,
    cleared_stages: clearedStages,
    points: points,
    inventory: inventory,
    updated_at: new Date().toISOString(),
  };

  try {
    // Upsert (insert or update)
    await sbFetch('/saves', 'POST', payload, {
      'Prefer': 'resolution=merge-duplicates,return=representation',
      'on_conflict': 'user_id',
    });
    sbConfig.lastSync = Date.now();
    localStorage.setItem('egami_sb_config', JSON.stringify(sbConfig));
    setSyncBadge('online');
    updateSyncStatusText();
    if (document.getElementById('settingsOverlay').classList.contains('show')) {
      showSettingsStatus('syncStatus', '✅ クラウドに保存しました！', 'ok');
    }
  } catch(e) {
    setSyncBadge('error');
    if (document.getElementById('settingsOverlay').classList.contains('show')) {
      showSettingsStatus('syncStatus', `❌ 保存失敗: ${e.message}`, 'err');
    }
  }
}

// ---- LOAD FROM CLOUD ----
async function loadFromCloud() {
  if (!sbConfig.url || !sbConfig.key) {
    showSettingsStatus('syncStatus', '⚠️ まずSupabaseに接続してください', 'err'); return;
  }
  if (!sbClient) initSupabase();
  showSettingsStatus('syncStatus', '⬇️ クラウドからデータを取得中…', 'info');

  const userId = getUserId();
  try {
    const rows = await sbFetch(`/saves?user_id=eq.${userId}&limit=1`);
    if (!rows || rows.length === 0) {
      showSettingsStatus('syncStatus', '☁️ クラウドにデータがありません', 'info'); return;
    }
    const data = rows[0];
    if (data.collection) { collection = data.collection; localStorage.setItem('egami_collection', JSON.stringify(collection)); }
    if (data.party)      { party = data.party;           localStorage.setItem('egami_party',      JSON.stringify(party)); }
    if (data.cleared_stages) { clearedStages = data.cleared_stages; localStorage.setItem('egami_cleared', JSON.stringify(clearedStages)); }
    if (data.points)     { points = data.points;         localStorage.setItem('egami_points',     JSON.stringify(points)); }
    if (data.inventory)  { inventory = data.inventory;   localStorage.setItem('egami_inventory',  JSON.stringify(inventory)); }
    renderCollection(); renderParty(); renderStageMap(); updatePointDisplay();
    showSettingsStatus('syncStatus', '✅ クラウドから読み込みました！', 'ok');
    setSyncBadge('online');
  } catch(e) {
    showSettingsStatus('syncStatus', `❌ 読み込み失敗: ${e.message}`, 'err');
  }
}

// ---- RANKING SUBMIT ----
async function submitRanking() {
  if (!sbConfig.url || !sbConfig.key) {
    showSettingsStatus('rankingStatus', '⚠️ まずSupabaseに接続してください', 'err'); return;
  }
  if (!sbClient) initSupabase();
  if (collection.length === 0) {
    showSettingsStatus('rankingStatus', '⚠️ まずキャラを作ろう！', 'err'); return;
  }
  showSettingsStatus('rankingStatus', '🏆 ランキングに登録中…', 'info');

  // Find best char by power
  const best = [...collection].sort((a,b) => calcPower(b) - calcPower(a))[0];
  const userId = getUserId();

  const payload = {
    user_id: userId,
    display_name: sbConfig.displayName || 'トレーナー',
    char_name: best.name,
    char_data: {
      name: best.name, rarity: best.rarity, element: best.element,
      class: best.class, level: best.level, hp: best.hp, attack: best.attack,
      defense: best.defense, speed: best.speed, luck: best.luck,
      imageData: best.imageData,
    },
    power: calcPower(best),
    updated_at: new Date().toISOString(),
  };

  try {
    await sbFetch('/ranking', 'POST', payload, {
      'Prefer': 'resolution=merge-duplicates,return=representation',
      'on_conflict': 'user_id',
    });
    showSettingsStatus('rankingStatus', `✅ ${best.name}（戦闘力${calcPower(best)}）を登録しました！`, 'ok');
  } catch(e) {
    showSettingsStatus('rankingStatus', `❌ 登録失敗: ${e.message}`, 'err');
  }
}

// ---- AUTH ----
async function sbAuth(endpoint, body) {
  if (!sbClient) throw new Error('先にSupabaseを接続してください');
  const res = await fetch(`${sbClient.url}/auth/v1/${endpoint}`, {
    method: 'POST',
    headers: { 'apikey': sbConfig.key, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || 'エラーが発生しました');
  return data;
}

async function loginUser() {
  const email = document.getElementById('inputEmail').value.trim();
  const pw = document.getElementById('inputPassword').value;
  if (!email || !pw) { showSettingsStatus('authStatus', 'メールとパスワードを入力してください', 'err'); return; }
  if (!sbClient) { showSettingsStatus('authStatus', '先にSupabaseに接続してください', 'err'); return; }
  showSettingsStatus('authStatus', '🔄 ログイン中…', 'info');
  try {
    const data = await sbAuth('token?grant_type=password', { email, password: pw });
    sbConfig.userId = data.user.id;
    sbConfig.authToken = data.access_token;
    sbConfig.email = email;
    sbConfig.displayName = sbConfig.displayName || email.split('@')[0];
    localStorage.setItem('egami_sb_config', JSON.stringify(sbConfig));
    // Update auth header to use user token
    sbClient.headers['Authorization'] = `Bearer ${data.access_token}`;
    showSettingsStatus('authStatus', `✅ ログイン成功！データを読み込みます`, 'ok');
    updateAuthUI();
    updateProfileUI();
    await loadFromCloud();
  } catch(e) {
    showSettingsStatus('authStatus', `❌ ${e.message}`, 'err');
  }
}

async function signupUser() {
  const email = document.getElementById('inputEmail').value.trim();
  const pw = document.getElementById('inputPassword').value;
  if (!email || !pw) { showSettingsStatus('authStatus', 'メールとパスワードを入力してください', 'err'); return; }
  if (pw.length < 6) { showSettingsStatus('authStatus', 'パスワードは6文字以上にしてください', 'err'); return; }
  if (!sbClient) { showSettingsStatus('authStatus', '先にSupabaseに接続してください', 'err'); return; }
  showSettingsStatus('authStatus', '🔄 登録中…', 'info');
  try {
    const data = await sbAuth('signup', { email, password: pw });
    if (data.user && !data.session) {
      showSettingsStatus('authStatus', '📧 確認メールを送りました！メールのリンクをクリックしてから再度ログインしてください', 'ok');
    } else if (data.access_token) {
      sbConfig.userId = data.user.id;
      sbConfig.authToken = data.access_token;
      sbConfig.email = email;
      sbConfig.displayName = email.split('@')[0];
      localStorage.setItem('egami_sb_config', JSON.stringify(sbConfig));
      sbClient.headers['Authorization'] = `Bearer ${data.access_token}`;
      showSettingsStatus('authStatus', '✅ 登録完了！', 'ok');
      updateAuthUI();
      updateProfileUI();
      await manualSync();
    }
  } catch(e) {
    showSettingsStatus('authStatus', `❌ ${e.message}`, 'err');
  }
}

function logoutUser() {
  if (!confirm('ログアウトしますか？\nデータはこのブラウザに残ります。')) return;
  sbConfig.userId = null;
  sbConfig.authToken = null;
  sbConfig.email = null;
  localStorage.setItem('egami_sb_config', JSON.stringify(sbConfig));
  if (sbClient) sbClient.headers['Authorization'] = `Bearer ${sbConfig.key}`;

}

let zukanFilter = 'all'; // 'all' | rarity | element

function switchZukanTab(tab) {
  ['zukan','ranking','stats'].forEach(t => {

// ---- ZUKAN ----
function renderZukan() {
  const total = collection.length;
  const countEl = document.getElementById('zukanCount');
  countEl.innerHTML = `コレクション: <span>${total}</span>体`;

  // Build filter buttons
  const filters = document.getElementById('zukanFilters');
  const rarities = ['LEGENDARY','EPIC','RARE','UNCOMMON','COMMON'];
  const elements = [...new Set(collection.map(c => c.element))];
  filters.innerHTML = `
    <button class="zukan-filter ${zukanFilter==='all'?'active':''}" onclick="setZukanFilter('all')">すべて</button>
    ${rarities.filter(r => collection.some(c => c.rarity === r)).map(r =>
      `<button class="zukan-filter ${zukanFilter===r?'active':''}" onclick="setZukanFilter('${r}')"
        style="${zukanFilter===r?'':''}border-color:${RARITY_DOT_COLORS[r]};color:${RARITY_DOT_COLORS[r]};background:${RARITY_DOT_COLORS[r]}18">
        ${RARITY_JP[r]}
      </button>`
    ).join('')}
    ${elements.map(el => {
      const elemColors = {'炎':'#ff6b35','水':'#60a5fa','木':'#34d399','光':'#fbbf24','闇':'#7c3aed','雷':'#facc15','風':'#a7f3d0'};
      const col = elemColors[el] || '#888';
      return `<button class="zukan-filter ${zukanFilter===el?'active':''}" onclick="setZukanFilter('${el}')"
        style="border-color:${col};color:${col};background:${col}18">${el}</button>`;
    }).join('')}
  `;

  let filtered = collection;
  if (zukanFilter !== 'all') {
    filtered = collection.filter(c => c.rarity === zukanFilter || c.element === zukanFilter);
  }
  // Sort by power score desc
  filtered = [...filtered].sort((a, b) => calcPower(b) - calcPower(a));

  const grid = document.getElementById('zukanGrid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="big">🔍</div><p>該当するキャラがいません</p></div>';
    return;
  }

  grid.innerHTML = filtered.map((c, i) => {
    const evoLv = getEvoLevel(c.level);
    const evoClass = evoLv >= 1 ? `evo-${evoLv}` : '';
    const rarityColor = RARITY_DOT_COLORS[c.rarity];
    const power = calcPower(c);
    const originalIdx = collection.indexOf(c);
    return `
      <div class="zukan-card ${evoClass}" onclick="openCharDetail(${originalIdx})">
        <div class="zukan-no">No.${String(originalIdx+1).padStart(3,'0')}</div>
        <div class="zukan-card-img"><img src="${c.imageData}" loading="lazy"></div>
        <div class="zukan-card-name">${c.name}</div>
        <div class="zukan-card-lv">
          <span>${c.element}</span>
          <span class="lv">Lv${c.level}</span>
        </div>
        <div style="font-size:0.58rem;color:${rarityColor};margin-top:2px;font-weight:700">
          💪${power}
        </div>
        <div class="zukan-rarity-bar" style="background:${rarityColor}"></div>
      </div>
    `;
  }).join('');
}

function setZukanFilter(f) {
  zukanFilter = f;
  renderZukan();
}

// Power score = weighted stat total
function calcPower(c) {
  return Math.round(
    (c.hp || 0) * 0.5 +
    (c.attack || 0) * 2 +
    (c.defense || 0) * 1.5 +
    (c.speed || 0) * 1 +
    (c.luck || 0) * 0.5 +
    c.level * 20
  );
}

async function renderRanking() {

  const myTop = [...collection].sort((a,b) => calcPower(b) - calcPower(a)).slice(0, 5);

    myDiv.innerHTML = '<div style="text-align:center;color:var(--text-dim);font-size:0.8rem;padding:20px">まだキャラがいません！えをかこう</div>';
  } else {
    myDiv.innerHTML = `<div class="ranking-list">${myTop.map((c, i) => {
      const power = calcPower(c);
      const evoLv = getEvoLevel(c.level);
      const evoLabel = evoLv > 0 ? `<span style="color:${['','#34d399','#c084fc','#fbbf24'][evoLv]};font-size:0.6rem"> 進化${'Ⅰ Ⅱ Ⅲ'.split(' ')[evoLv-1]}</span>` : '';
      const originalIdx = collection.indexOf(c);
      return `
        <div class="ranking-row ${rowClasses[i]}" onclick="openCharDetail(${originalIdx});switchTab('collection')">
          <div class="ranking-rank">${rankIcons[i]}</div>
          <div class="ranking-img"><img src="${c.imageData}"></div>
          <div class="ranking-info">
            <div class="ranking-name">${c.name}${evoLabel}</div>
            <div class="ranking-sub">${c.element} / ${c.class} / Lv.${c.level}</div>
          </div>
          <div class="ranking-power">
            <div class="ranking-power-val">${power}</div>
            <div class="ranking-power-label">せんりょく</div>
          </div>
        </div>
      `;
    }).join('')}</div>`;
  }

  // Global ranking - try Supabase first, fall back to mock
  const globalDiv = document.getElementById('globalRanking');
  globalDiv.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:16px;font-size:0.8rem">🔄 読み込み中…</div>';

  let realRows = null;
  if (sbConfig.url && sbConfig.key && sbClient) {
    realRows = await loadGlobalRanking();
  }

  const userId = getUserId();
  let allGlobal;

  if (realRows && realRows.length > 0) {
    // Real data from Supabase
    allGlobal = realRows.map(r => ({
      name: r.char_name,
      icon: null,
      imageData: r.char_data?.imageData,
      rarity: r.char_data?.rarity,
      element: r.char_data?.element || '',
      level: r.char_data?.level || 1,
      power: r.power,
      player: r.display_name || 'トレーナー',
      isMe: r.user_id === userId,
    }));
  } else {
    // Mock data with my best inserted
    const myBest = myTop[0] ? calcPower(myTop[0]) : 0;
    const myBestChar = myTop[0];
    allGlobal = [...MOCK_GLOBAL];
    if (myBestChar) {
      const insertAt = allGlobal.findIndex(g => g.power < myBest);
      if (insertAt >= 0) allGlobal.splice(insertAt, 0, { ...myBestChar, power: myBest, player: sbConfig.displayName || 'あなた', isMe: true });
      else allGlobal.push({ ...myBestChar, power: myBest, player: sbConfig.displayName || 'あなた', isMe: true });
    }
    allGlobal = allGlobal.slice(0, 8);
  }

  globalDiv.innerHTML = allGlobal.map((g, i) => {
    const rankNum = i + 1;
    const rankMedal = rankNum === 1 ? '🥇' : rankNum === 2 ? '🥈' : rankNum === 3 ? '🥉' : `${rankNum}`;
    const youBadge = g.isMe ? '<span class="global-you-badge">YOU</span>' : '';
    const avatar = g.imageData
      ? `<div class="global-avatar" style="padding:0;overflow:hidden"><img src="${g.imageData}" style="width:100%;height:100%;object-fit:cover;border-radius:8px"></div>`
      : `<div class="global-avatar">${g.icon || '⚔️'}</div>`;
    return `
      <div class="global-row" style="${g.isMe ? 'opacity:1;border-color:var(--accent3);background:rgba(124,58,237,0.1)' : ''}">
        <div class="global-rank">${rankMedal}</div>
        ${avatar}
        <div class="global-info">
          <div class="global-name">${g.name}${youBadge}</div>
          <div class="global-sub">${g.player} / ${g.element} Lv.${g.level}</div>
        </div>
        <div class="global-power">${g.power}</div>
      </div>
    `;
  }).join('') || '<div style="text-align:center;color:var(--text-dim);padding:16px;font-size:0.8rem">まだランキングデータがありません</div>';
}

// ---- STATS ----
function renderStats() {
  const c = collection;
  if (c.length === 0) {
    document.getElementById('myStats').innerHTML = '<div class="empty-state"><div class="big">📊</div><p>まだキャラがいません</p></div>';
    return;
  }

  const total = c.length;
  const maxPower = Math.max(...c.map(calcPower));
  const maxPowerChar = c.find(ch => calcPower(ch) === maxPower);
  const avgLv = (c.reduce((s, ch) => s + ch.level, 0) / total).toFixed(1);
  const clearedCount = clearedStages.length;

  const rarityCounts = {};
  ['LEGENDARY','EPIC','RARE','UNCOMMON','COMMON'].forEach(r => { rarityCounts[r] = c.filter(ch => ch.rarity === r).length; });

  const elemCount = {};
  c.forEach(ch => { elemCount[ch.element] = (elemCount[ch.element] || 0) + 1; });
  const topElem = Object.entries(elemCount).sort((a,b) => b[1]-a[1])[0];

  const totalBattlePower = c.reduce((s, ch) => s + calcPower(ch), 0);

  document.getElementById('myStats').innerHTML = `
    <div class="stats-section">
      <div class="stats-card">
        <div class="stats-card-title">📈 ぜんたいせいせき</div>
        <div class="stats-grid-2">
          <div class="stats-item"><div class="stats-val">${total}</div><div class="stats-label">そうなかま数</div></div>
          <div class="stats-item"><div class="stats-val">${avgLv}</div><div class="stats-label">へいきんレベル</div></div>
          <div class="stats-item"><div class="stats-val">${maxPower}</div><div class="stats-label">さいこうせんりょく</div></div>
          <div class="stats-item"><div class="stats-val">${clearedCount}</div><div class="stats-label">クリアステージ</div></div>
        </div>
      </div>

      <div class="stats-card">
        <div class="stats-card-title">⭐ さいきょうのなかま</div>
        ${maxPowerChar ? `
          <div style="display:flex;gap:12px;align-items:center">
            <div style="width:64px;height:64px;border-radius:10px;overflow:hidden;background:white;flex-shrink:0;border:2px solid ${RARITY_DOT_COLORS[maxPowerChar.rarity]}">
              <img src="${maxPowerChar.imageData}" style="width:100%;height:100%;object-fit:cover">
            </div>
            <div>
              <div style="font-size:1rem;font-weight:900">${maxPowerChar.name}</div>
              <div style="font-size:0.7rem;color:var(--text-dim);margin-top:2px">${maxPowerChar.element} / ${maxPowerChar.class} / Lv.${maxPowerChar.level}</div>
              <div style="font-size:0.75rem;color:var(--accent2);font-weight:700;margin-top:4px">💪 せんりょく ${maxPower}</div>
            </div>
          </div>
        ` : ''}
      </div>

      <div class="stats-card">
        <div class="stats-card-title">💎 レアリティ内訳</div>
        <div class="rarity-breakdown">
          ${['LEGENDARY','EPIC','RARE','UNCOMMON','COMMON'].map(r => {
            const cnt = rarityCounts[r] || 0;
            const pct = total > 0 ? Math.round((cnt / total) * 100) : 0;
            return `
              <div class="rarity-row-stat">
                <div class="label" style="color:${RARITY_DOT_COLORS[r]};font-size:0.72rem;font-weight:700">${RARITY_JP[r]}</div>
                <div class="rarity-row-bar"><div class="rarity-row-fill" style="width:${pct}%;background:${RARITY_DOT_COLORS[r]}"></div></div>
                <div class="rarity-row-count" style="color:${RARITY_DOT_COLORS[r]}">${cnt}</div>
              </div>
            `;
          }).join('')}
        </div>
      </div>

      <div class="stats-card">
        <div class="stats-card-title">🔮 属性ぶんぷ</div>
        <div class="element-tags">
          ${Object.entries(elemCount).sort((a,b)=>b[1]-a[1]).map(([el, cnt]) => {
            const elemColors = {'炎':'#ff6b35','水':'#60a5fa','木':'#34d399','光':'#fbbf24','闇':'#7c3aed','雷':'#facc15','風':'#a7f3d0'};
            const col = elemColors[el] || '#888';
            return `<div class="element-tag" style="border-color:${col};color:${col};background:${col}18">${el} ×${cnt}</div>`;
          }).join('')}
        </div>
        ${topElem ? `<div style="margin-top:10px;font-size:0.72rem;color:var(--text-dim)">いちばん多い属性: <span style="color:var(--text);font-weight:700">${topElem[0]}</span>（${topElem[1]}体）</div>` : ''}
      </div>
    </div>
  `;
  // Animate bars
  setTimeout(() => {
    document.querySelectorAll('.rarity-row-fill').forEach(el => {
      const w = el.style.width; el.style.width = '0'; void el.offsetWidth; el.style.width = w;
    });
  }, 50);
}

// =====================
// SHARE SYSTEM
// =====================
let shareChar = null;

function openShare() {
  if (detailCharIdx === null) return;
  shareChar = collection[detailCharIdx];
  drawShareCard(shareChar);
  document.getElementById('shareOverlay').classList.add('show');
  // Show native share if supported
  if (navigator.share) {
    document.getElementById('shareBtnNative').style.display = 'flex';
  }
}

function closeShare() {
  document.getElementById('shareOverlay').classList.remove('show');
}

function drawShareCard(c) {
  const canvas = document.getElementById('shareCanvas');
  const ctx = canvas.getContext('2d');
  const W = 680, H = 400;
  canvas.width = W; canvas.height = H;

  const rarityColors = {
    COMMON:    { bg1: '#1a1a2e', bg2: '#16213e', accent: '#9ca3af', glow: 'rgba(156,163,175,0.3)' },
    UNCOMMON:  { bg1: '#0a2010', bg2: '#0d2818', accent: '#34d399', glow: 'rgba(52,211,153,0.4)' },
    RARE:      { bg1: '#0a1628', bg2: '#0d1f3c', accent: '#60a5fa', glow: 'rgba(96,165,250,0.4)' },
    EPIC:      { bg1: '#1a0a2e', bg2: '#210d3c', accent: '#c084fc', glow: 'rgba(192,132,252,0.4)' },
    LEGENDARY: { bg1: '#2a1500', bg2: '#3a1c00', accent: '#fbbf24', glow: 'rgba(251,191,36,0.5)' },
  };
  const theme = rarityColors[c.rarity] || rarityColors.COMMON;

  // Background gradient
  const bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, theme.bg1);
  bgGrad.addColorStop(1, theme.bg2);
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Glow radial behind character image
  const glowGrad = ctx.createRadialGradient(160, 200, 20, 160, 200, 200);
  glowGrad.addColorStop(0, theme.glow);
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars sprinkled
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  [[40,30],[580,50],[620,320],[30,350],[400,20],[560,200],[200,380]].forEach(([x,y]) => {
    ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI*2); ctx.fill();
  });

  // Rarity top banner
  const bannerGrad = ctx.createLinearGradient(0, 0, W, 0);
  bannerGrad.addColorStop(0, theme.accent + '44');
  bannerGrad.addColorStop(0.5, theme.accent + '22');
  bannerGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = bannerGrad;
  ctx.fillRect(0, 0, W, 44);

  // Rarity label
  const rarityJP = { COMMON:'コモン', UNCOMMON:'アンコモン', RARE:'レア', EPIC:'エピック', LEGENDARY:'レジェンダリー' };
  const rarityIcon = { COMMON:'⚪', UNCOMMON:'🟢', RARE:'🔵', EPIC:'🟣', LEGENDARY:'⭐' };
  ctx.fillStyle = theme.accent;
  ctx.font = 'bold 18px "M PLUS Rounded 1c", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`${rarityIcon[c.rarity]} ${rarityJP[c.rarity]}`, 18, 28);

  // Game title top right
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '13px "Kaisei Decol", serif';
  ctx.textAlign = 'right';
  ctx.fillText('えがみ伝説', W - 16, 28);

  // Character image (left side)
  const imgSize = 280;
  const imgX = 30, imgY = 56;
  // White card background
  ctx.fillStyle = 'white';
  ctx.beginPath();
  roundRect(ctx, imgX - 4, imgY - 4, imgSize + 8, imgSize + 8, 14);
  ctx.fill();
  // Glow border
  ctx.strokeStyle = theme.accent;
  ctx.lineWidth = 3;
  ctx.beginPath();
  roundRect(ctx, imgX - 4, imgY - 4, imgSize + 8, imgSize + 8, 14);
  ctx.stroke();

  const img = new Image();
  img.onload = () => {
    ctx.save();
    ctx.beginPath();
    roundRect(ctx, imgX, imgY, imgSize, imgSize, 10);
    ctx.clip();
    ctx.drawImage(img, imgX, imgY, imgSize, imgSize);
    ctx.restore();
    drawShareCardText(ctx, c, theme, W, H, rarityJP, rarityIcon);
  };
  img.onerror = () => drawShareCardText(ctx, c, theme, W, H, rarityJP, rarityIcon);
  img.src = c.imageData;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawShareCardText(ctx, c, theme, W, H, rarityJP, rarityIcon) {
  const rx = 340; // right panel x start

  // Evo indicator
  const evoLv = getEvoLevel(c.level);
  if (evoLv > 0) {
    const evoColors = ['','#34d399','#c084fc','#fbbf24'];
    const evoLabels = ['','進化Ⅰ','進化Ⅱ','進化Ⅲ'];
    ctx.fillStyle = evoColors[evoLv] + '33';
    ctx.beginPath();
    roundRect(ctx, rx, 54, 110, 24, 6);
    ctx.fill();
    ctx.fillStyle = evoColors[evoLv];
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('✦ ' + evoLabels[evoLv], rx + 8, 70);
  }

  // Character name
  ctx.fillStyle = 'white';
  ctx.font = `bold 30px "Kaisei Decol", serif`;
  ctx.textAlign = 'left';
  // Truncate long names
  let name = c.name;
  while (ctx.measureText(name).width > W - rx - 20 && name.length > 2) name = name.slice(0,-1) + '…';
  ctx.fillText(name, rx, 118);

  // Flavor text
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = '13px "M PLUS Rounded 1c", sans-serif';
  ctx.fillText(c.flavor || '', rx, 142);

  // Element + Class badges
  const elemColors = {'炎':'#ff6b35','水':'#60a5fa','木':'#34d399','光':'#fbbf24','闇':'#7c3aed','雷':'#facc15','風':'#a7f3d0'};
  const badgeY = 160;
  [[c.element, elemColors[c.element] || '#888'], [c.class, '#818cf8']].forEach(([label, color], i) => {
    const bx = rx + i * 90;
    ctx.fillStyle = color + '33';
    ctx.beginPath(); roundRect(ctx, bx, badgeY, 82, 22, 6); ctx.fill();
    ctx.fillStyle = color;
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(label, bx + 41, badgeY + 15);
  });
  ctx.textAlign = 'left';

  // Level badge
  ctx.fillStyle = 'rgba(251,191,36,0.2)';
  ctx.beginPath(); roundRect(ctx, rx + 185, badgeY, 60, 22, 6); ctx.fill();
  ctx.fillStyle = '#fbbf24';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`Lv.${c.level}`, rx + 215, badgeY + 15);
  ctx.textAlign = 'left';

  // Stats grid
  const stats = [
    { label:'HP',   val: c.hp,      color:'#22c55e' },
    { label:'ATK',  val: c.attack,  color:'#f97316' },
    { label:'DEF',  val: c.defense, color:'#60a5fa' },
    { label:'SPD',  val: c.speed,   color:'#fbbf24' },
    { label:'LCK',  val: c.luck,    color:'#ec4899' },
  ];
  const statY = 200;
  stats.forEach((s, i) => {
    const col = i % 3, row = Math.floor(i / 3);
    const sx = rx + col * 100, sy = statY + row * 52;
    // Stat box
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath(); roundRect(ctx, sx, sy, 88, 42, 8); ctx.fill();
    ctx.strokeStyle = s.color + '44';
    ctx.lineWidth = 1;
    ctx.beginPath(); roundRect(ctx, sx, sy, 88, 42, 8); ctx.stroke();
    // Label
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(s.label, sx + 8, sy + 14);
    // Value
    ctx.fillStyle = s.color;
    ctx.font = `bold 18px "M PLUS Rounded 1c", sans-serif`;
    ctx.fillText(s.val || 0, sx + 8, sy + 34);
  });

  // Equipped stones
  const stones = (c.equippedStones || []).filter(Boolean);
  if (stones.length > 0) {
    const stoneY = 310;
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('💎 そうびストーン', rx, stoneY);
    stones.forEach((sid, i) => {
      const def = (typeof BOSS_DROP_TABLE !== 'undefined') ? BOSS_DROP_TABLE.find(d => d.id === sid) : null;
      if (!def) return;
      ctx.fillStyle = 'rgba(124,58,237,0.3)';
      ctx.beginPath(); roundRect(ctx, rx + i * 170, stoneY + 8, 160, 22, 6); ctx.fill();
      ctx.fillStyle = '#c084fc';
      ctx.font = '11px sans-serif';
      ctx.fillText(`${def.icon} ${def.name}`, rx + 6 + i * 170, stoneY + 22);
    });
  }

  // Bottom: game tag
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(0, H - 34, W, 34);
  ctx.fillStyle = theme.accent;
  ctx.font = 'bold 13px "M PLUS Rounded 1c", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('#えがみ伝説  #DrawBattleRPG  #えがいてたたかう', W/2, H - 12);
}

function downloadShareCard() {
  const canvas = document.getElementById('shareCanvas');
  const a = document.createElement('a');
  a.download = `egami-${shareChar?.name || 'card'}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

async function nativeShare() {
  const canvas = document.getElementById('shareCanvas');
  try {
    canvas.toBlob(async (blob) => {
      const file = new File([blob], `egami-${shareChar?.name || 'card'}.png`, { type: 'image/png' });
      await navigator.share({
        title: `えがみ伝説 - ${shareChar?.name}`,
        text: `${shareChar?.name}（${shareChar?.rarity}）をゲットした！\nLv.${shareChar?.level} / ${shareChar?.element} / ${shareChar?.class}\n#えがみ伝説 #DrawBattleRPG`,
        files: [file],
      });
    }, 'image/png');
  } catch(e) {
    // fallback to download
    downloadShareCard();
  }
}

function copyShareText() {
  const c = shareChar;
  if (!c) return;
  const text = `🎨 えがみ伝説\n✨ ${c.name}（${c.rarity === 'LEGENDARY' ? '⭐レジェンダリー' : c.rarity === 'EPIC' ? '🟣エピック' : c.rarity === 'RARE' ? '🔵レア' : c.rarity === 'UNCOMMON' ? '🟢アンコモン' : '⚪コモン'}）\nLv.${c.level} / ${c.element}属性 / ${c.class}\nHP:${c.hp} ATK:${c.attack} DEF:${c.defense}\n#えがみ伝説 #DrawBattleRPG`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.share-btn.copy');
    btn.textContent = '✅ コピーしました！';
    setTimeout(() => btn.innerHTML = '📋 テキストをコピー', 2000);
  });
}

// =====================
// TABS
// =====================
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['draw','collection','battle','zukan'][i] === name);
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  if (name === 'collection') renderCollection();
  if (name === 'battle') { renderStageMap(); selectStage(selectedStageId); renderParty(); checkSynergy(); }
  if (name === 'zukan') { zukanFilter = 'all'; renderZukan(); }
}

renderCollection();
renderParty();
updateEffort();
updatePointDisplay();
renderStageMap();
selectStage(0);
