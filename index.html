<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SASHIMINOKURAGE - 描いて戦え！</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');

  :root {
    --bg: #0a0a1a;
    --surface: #12122a;
    --card: #1a1a35;
    --border: #2a2a5a;
    --accent1: #ff6b35;
    --accent2: #ffd700;
    --accent3: #7c3aed;
    --text: #f0f0ff;
    --text-dim: #8888aa;
    --common: #9ca3af;
    --uncommon: #34d399;
    --rare: #60a5fa;
    --epic: #c084fc;
    --legendary: #fbbf24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'M PLUS Rounded 1c', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(2px 2px at 60% 40%, rgba(255,200,100,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 16px; min-height: 100vh; }

  /* Header */
  .header {
    text-align: center;
    padding: 20px 0 16px;
    position: relative;
  }
  .header-settings-btn {
    position: absolute; top: 20px; right: 0;
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); font-size: 1.1rem;
    width: 36px; height: 36px; border-radius: 10px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s;
  }
  .header-settings-btn:hover { border-color: var(--accent3); color: var(--text); }
  .header-sync-badge {
    position: absolute; top: 20px; left: 0;
    font-size: 0.6rem; padding: 4px 8px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); cursor: pointer;
  }
  .header-sync-badge.online { border-color: #34d399; color: #34d399; background: rgba(52,211,153,0.1); }
  .header-sync-badge.syncing { border-color: var(--accent2); color: var(--accent2); animation: syncPulse 1s ease-in-out infinite; }
  @keyframes syncPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .header h1 {
    font-family: 'Kaisei Decol', serif;
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent2), var(--accent1), #ff4da6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.05em;
  }
  .header .sub {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    background: var(--surface);
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 10px 8px;
    text-align: center;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text-dim);
    transition: all 0.2s;
  }
  .tab.active {
    background: linear-gradient(135deg, var(--accent3), #9f1de8);
    color: white;
    box-shadow: 0 4px 15px rgba(124,58,237,0.4);
  }
  .tab .icon { font-size: 1.1rem; display: block; margin-bottom: 2px; }

  /* Sections */
  .section { display: none; }
  .section.active { display: block; }

  /* === DRAW SECTION === */
  .draw-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .draw-title { font-size: 0.85rem; color: var(--text-dim); }
  .effort-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .effort-label { font-size: 0.72rem; color: var(--text-dim); }
  .effort-bar {
    width: 100px;
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .effort-fill {
    height: 100%;
    background: linear-gradient(90deg, #34d399, #fbbf24, #ff6b35);
    border-radius: 99px;
    width: 0%;
    transition: width 0.3s;
  }

  .canvas-wrap {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    border: 2px solid var(--border);
    background: white;
    box-shadow: 0 0 40px rgba(124,58,237,0.15);
  }
  #drawCanvas {
    display: block;
    width: 100%;
    touch-action: none;
    cursor: crosshair;
  }

  .tools {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .color-palette {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }
  .color-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }
  .color-btn.active { border-color: white; transform: scale(1.2); }

  .tool-btns {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .tool-btn {
    padding: 7px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .tool-btn:hover { border-color: var(--accent3); }
  .tool-btn.active { background: var(--accent3); border-color: var(--accent3); }

  .size-slider {
    -webkit-appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    outline: none;
    width: 80px;
  }
  .size-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent3);
    cursor: pointer;
  }

  .generate-btn {
    width: 100%;
    margin-top: 16px;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--accent1), #ff4da6);
    color: white;
    font-size: 1rem;
    font-weight: 900;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.05em;
    box-shadow: 0 6px 25px rgba(255,107,53,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }
  .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,107,53,0.5); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .generate-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transform: translateX(-100%);
  }
  .generate-btn.loading::after {
    animation: shimmer 1s infinite;
  }
  @keyframes shimmer {
    to { transform: translateX(100%); }
  }

  .effort-tip {
    text-align: center;
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 8px;
  }
  .effort-tip.warn { color: var(--accent1); }

  /* === LOADING OVERLAY === */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,26,0.92);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }
  .loading-overlay.show { display: flex; }

  .magic-circle {
    width: 120px;
    height: 120px;
    position: relative;
  }
  .magic-ring {
    position: absolute;
    border-radius: 50%;
    border: 3px solid transparent;
  }
  .magic-ring:nth-child(1) {
    inset: 0;
    border-top-color: var(--accent2);
    border-right-color: var(--accent2);
    animation: spin 1s linear infinite;
  }
  .magic-ring:nth-child(2) {
    inset: 15px;
    border-bottom-color: var(--accent1);
    border-left-color: var(--accent1);
    animation: spin 0.7s linear infinite reverse;
  }
  .magic-ring:nth-child(3) {
    inset: 30px;
    border-top-color: var(--accent3);
    border-right-color: var(--accent3);
    animation: spin 0.5s linear infinite;
  }
  .magic-core {
    position: absolute;
    inset: 45px;
    background: radial-gradient(circle, var(--accent2), var(--accent1));
    border-radius: 50%;
    animation: pulse 0.8s ease-in-out infinite alternate;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { to { transform: scale(1.3); opacity: 0.7; } }

  .loading-text {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent2);
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .loading-sub { font-size: 0.78rem; color: var(--text-dim); }

  /* === RESULT OVERLAY === */
  .result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,26,0.95);
    z-index: 101;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px 16px;
    overflow-y: auto;
  }
  .result-overlay.show { display: flex; }

  /* flash is injected dynamically */

  .rarity-banner {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
    animation: dropIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
  }
  @keyframes flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes dropIn {
    from { transform: translateY(-30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .rarity-common { color: var(--common); text-shadow: 0 0 20px rgba(156,163,175,0.5); }
  .rarity-uncommon { color: var(--uncommon); text-shadow: 0 0 20px rgba(52,211,153,0.6); }
  .rarity-rare { color: var(--rare); text-shadow: 0 0 25px rgba(96,165,250,0.7); }
  .rarity-epic { color: var(--epic); text-shadow: 0 0 30px rgba(192,132,252,0.8); }
  .rarity-legendary {
    color: var(--legendary);
    text-shadow: 0 0 30px rgba(251,191,36,0.9), 0 0 60px rgba(251,191,36,0.5);
    animation: dropIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both, legendaryPulse 2s ease-in-out 1s infinite;
  }
  @keyframes legendaryPulse {
    0%,100% { text-shadow: 0 0 30px rgba(251,191,36,0.9), 0 0 60px rgba(251,191,36,0.5); }
    50% { text-shadow: 0 0 50px rgba(251,191,36,1), 0 0 100px rgba(251,191,36,0.8); }
  }

  .char-card {
    background: var(--card);
    border-radius: 20px;
    padding: 20px;
    width: 100%;
    max-width: 380px;
    border: 1px solid var(--border);
    animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s both;
    margin-bottom: 16px;
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .char-top {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
  }
  .char-img-wrap {
    width: 100px;
    height: 100px;
    border-radius: 14px;
    overflow: hidden;
    border: 2px solid var(--border);
    flex-shrink: 0;
    background: white;
  }
  .char-img-wrap img { width: 100%; height: 100%; object-fit: cover; }

  .char-info { flex: 1; }
  .char-name {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .badge {
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 0.7rem;
    font-weight: 700;
  }
  .badge-element {
    background: rgba(124,58,237,0.3);
    border: 1px solid rgba(124,58,237,0.5);
    color: #c084fc;
  }
  .badge-class {
    background: rgba(255,107,53,0.2);
    border: 1px solid rgba(255,107,53,0.4);
    color: var(--accent1);
  }
  .char-flavor {
    font-size: 0.72rem;
    color: var(--text-dim);
    line-height: 1.5;
    font-style: italic;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .stat-item {
    background: var(--surface);
    border-radius: 10px;
    padding: 8px 10px;
  }
  .stat-label { font-size: 0.65rem; color: var(--text-dim); margin-bottom: 4px; }
  .stat-bar-wrap { display: flex; align-items: center; gap: 6px; }
  .stat-bar {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .stat-fill {
    height: 100%;
    border-radius: 99px;
    animation: growBar 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s both;
    transform-origin: left;
  }
  @keyframes growBar {
    from { width: 0 !important; }
  }
  .stat-value { font-size: 0.78rem; font-weight: 700; min-width: 28px; text-align: right; }

  .skills-section { margin-top: 12px; }
  .skills-title { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 8px; }
  .skill-list { display: flex; flex-direction: column; gap: 6px; }
  .skill-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border-radius: 10px;
    padding: 8px 12px;
  }
  .skill-icon { font-size: 1.2rem; }
  .skill-name { font-size: 0.8rem; font-weight: 700; }
  .skill-desc { font-size: 0.68rem; color: var(--text-dim); }

  .result-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 380px;
    animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.9s both;
  }
  .btn-primary {
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--accent3), #9f1de8);
    color: white;
    font-size: 0.9rem;
    font-weight: 900;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(124,58,237,0.4);
  }
  .btn-secondary {
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 0.9rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }

  /* ===========================
     SETTINGS OVERLAY
     =========================== */
  .settings-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(10,10,26,0.98); z-index: 150;
    flex-direction: column; overflow-y: auto; padding: 24px 20px 40px;
  }
  .settings-overlay.show { display: flex; }
  .settings-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
  }
  .settings-title {
    font-family: 'Kaisei Decol', serif; font-size: 1.2rem; color: var(--accent2); flex: 1;
  }
  .settings-close { font-size: 1.4rem; cursor: pointer; color: var(--text-dim); }

  .settings-section { margin-bottom: 20px; }
  .settings-section-title {
    font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.1em; margin-bottom: 10px;
  }
  .settings-card {
    background: var(--card); border-radius: 14px;
    border: 1px solid var(--border); padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .settings-field { display: flex; flex-direction: column; gap: 6px; }
  .settings-label { font-size: 0.72rem; color: var(--text-dim); font-weight: 700; }
  .settings-input {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px;
    color: var(--text); font-size: 0.82rem; font-family: inherit;
    outline: none; transition: border-color 0.15s; width: 100%;
  }
  .settings-input:focus { border-color: var(--accent3); }
  .settings-input::placeholder { color: var(--text-dim); }

  .settings-btn {
    width: 100%; padding: 12px; border-radius: 12px; border: none;
    font-size: 0.9rem; font-weight: 900; cursor: pointer; font-family: inherit;
    transition: transform 0.15s;
  }
  .settings-btn:hover { transform: translateY(-2px); }
  .settings-btn.primary {
    background: linear-gradient(135deg, var(--accent3), #9f1de8);
    color: white; box-shadow: 0 4px 20px rgba(124,58,237,0.4);
  }
  .settings-btn.success {
    background: linear-gradient(135deg, #34d399, #059669);
    color: white; box-shadow: 0 4px 20px rgba(52,211,153,0.4);
  }
  .settings-btn.danger {
    background: var(--surface); border: 1px solid #ef4444; color: #ef4444;
  }
  .settings-btn.secondary {
    background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
  }

  .settings-status {
    font-size: 0.72rem; padding: 8px 12px; border-radius: 8px;
    text-align: center; display: none;
  }
  .settings-status.show { display: block; }
  .settings-status.ok { background: rgba(52,211,153,0.15); color: #34d399; border: 1px solid #34d399; }
  .settings-status.err { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid #ef4444; }
  .settings-status.info { background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid #60a5fa; }

  .settings-profile-row {
    display: flex; align-items: center; gap: 12px;
  }
  .settings-avatar {
    width: 52px; height: 52px; border-radius: 14px;
    background: linear-gradient(135deg, var(--accent3), #9f1de8);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; flex-shrink: 0;
  }
  .settings-profile-info { flex: 1; }
  .settings-profile-name { font-size: 0.9rem; font-weight: 900; }
  .settings-profile-sub { font-size: 0.65rem; color: var(--text-dim); margin-top: 2px; }

  .supabase-guide {
    background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.3);
    border-radius: 12px; padding: 12px 14px;
    font-size: 0.72rem; line-height: 1.7; color: var(--text-dim);
  }
  .supabase-guide a { color: #34d399; }
  .supabase-guide ol { padding-left: 16px; }
  .supabase-guide code {
    background: rgba(255,255,255,0.08); padding: 1px 5px;
    border-radius: 4px; font-size: 0.68rem; color: var(--text);
  }

  /* ===========================
     ZUKAN & RANKING
  =========================== */
  .zukan-tabs {
    display: flex; gap: 6px; margin-bottom: 16px;
  }
  .zukan-tab {
    flex: 1; padding: 8px 4px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); font-size: 0.75rem; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .zukan-tab.active {
    background: linear-gradient(135deg, var(--accent3), #9f1de8);
    border-color: var(--accent3); color: white;
    box-shadow: 0 3px 12px rgba(124,58,237,0.35);
  }
  .zsub { display: none; }
  .zsub.active { display: block; }

  /* Zukan header */
  .zukan-header { margin-bottom: 12px; }
  .zukan-count {
    font-size: 0.78rem; color: var(--text-dim); margin-bottom: 8px;
  }
  .zukan-count span { color: var(--accent2); font-weight: 900; font-size: 1rem; }
  .zukan-filters {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .zukan-filter {
    padding: 4px 10px; border-radius: 99px; font-size: 0.68rem; font-weight: 700;
    border: 1px solid var(--border); background: var(--surface); color: var(--text-dim);
    cursor: pointer; font-family: inherit; transition: all 0.12s;
  }
  .zukan-filter.active {
    border-color: var(--accent2); background: rgba(251,191,36,0.15); color: var(--accent2);
  }

  /* Zukan grid - 3 columns, smaller than collection */
  .zukan-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .zukan-card {
    background: var(--card); border-radius: 12px;
    border: 1px solid var(--border); padding: 8px;
    cursor: pointer; transition: transform 0.12s, border-color 0.12s;
    position: relative; overflow: hidden;
  }
  .zukan-card:hover { transform: scale(1.03); border-color: var(--accent3); }
  .zukan-card.evo-1 { border-color: #34d399; box-shadow: 0 0 8px rgba(52,211,153,0.3); }
  .zukan-card.evo-2 { border-color: #c084fc; box-shadow: 0 0 10px rgba(192,132,252,0.35); }
  .zukan-card.evo-3 { border-color: #fbbf24; box-shadow: 0 0 14px rgba(251,191,36,0.5); animation: evo3CardPulse 2s ease-in-out infinite; }
  .zukan-card-img {
    width: 100%; aspect-ratio: 1; border-radius: 6px;
    overflow: hidden; background: white; margin-bottom: 5px;
  }
  .zukan-card-img img { width: 100%; height: 100%; object-fit: cover; }
  .zukan-card-name {
    font-size: 0.65rem; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .zukan-card-lv {
    font-size: 0.58rem; color: var(--text-dim);
    display: flex; justify-content: space-between;
  }
  .zukan-card-lv .lv { color: var(--accent2); font-weight: 700; }
  .zukan-rarity-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px;
  }
  .zukan-no {
    position: absolute; top: 4px; left: 5px;
    font-size: 0.5rem; color: var(--text-dim); font-weight: 700;
  }

  /* Ranking */
  .ranking-notice {
    background: var(--card); border-radius: 12px;
    border: 1px dashed var(--border); padding: 14px;
    display: flex; gap: 10px; align-items: flex-start;
    margin-bottom: 16px;
  }
  .ranking-notice-icon { font-size: 1.5rem; }
  .ranking-notice-text { font-size: 0.72rem; color: var(--text-dim); line-height: 1.6; }

  .ranking-section-title {
    font-size: 0.72rem; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px;
  }

  .ranking-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
  .ranking-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border-radius: 12px; padding: 10px 12px;
    border: 1px solid var(--border);
  }
  .ranking-row.top1 { border-color: #fbbf24; background: rgba(251,191,36,0.08); }
  .ranking-row.top2 { border-color: #9ca3af; background: rgba(156,163,175,0.06); }
  .ranking-row.top3 { border-color: #cd7f32; background: rgba(205,127,50,0.06); }
  .ranking-rank {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.1rem; font-weight: 700; min-width: 28px; text-align: center;
  }
  .ranking-img {
    width: 44px; height: 44px; border-radius: 8px;
    overflow: hidden; background: white; flex-shrink: 0;
  }
  .ranking-img img { width: 100%; height: 100%; object-fit: cover; }
  .ranking-info { flex: 1; min-width: 0; }
  .ranking-name { font-size: 0.82rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ranking-sub { font-size: 0.62rem; color: var(--text-dim); margin-top: 2px; }
  .ranking-power {
    text-align: right; flex-shrink: 0;
  }
  .ranking-power-val {
    font-size: 1rem; font-weight: 900; color: var(--accent2);
  }
  .ranking-power-label { font-size: 0.58rem; color: var(--text-dim); }

  /* Global ranking mock rows */
  .global-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border-radius: 12px; padding: 10px 12px;
    border: 1px solid var(--border); margin-bottom: 6px; opacity: 0.7;
  }
  .global-rank { font-size: 0.9rem; font-weight: 700; min-width: 28px; color: var(--text-dim); }
  .global-avatar { width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; background: var(--surface); }
  .global-info { flex: 1; }
  .global-name { font-size: 0.8rem; font-weight: 700; }
  .global-sub { font-size: 0.62rem; color: var(--text-dim); }
  .global-power { font-size: 0.9rem; font-weight: 900; color: var(--accent2); }
  .global-you-badge {
    font-size: 0.58rem; padding: 2px 6px; border-radius: 99px;
    background: rgba(124,58,237,0.3); color: #c084fc; border: 1px solid #7c3aed;
    margin-left: 4px;
  }

  /* Stats */
  .stats-section { display: flex; flex-direction: column; gap: 12px; }
  .stats-card {
    background: var(--card); border-radius: 14px;
    border: 1px solid var(--border); padding: 14px;
  }
  .stats-card-title {
    font-size: 0.72rem; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px;
  }
  .stats-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stats-item { text-align: center; }
  .stats-val {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.8rem; font-weight: 700; color: var(--accent2);
  }
  .stats-label { font-size: 0.65rem; color: var(--text-dim); margin-top: 2px; }
  .rarity-breakdown { display: flex; flex-direction: column; gap: 6px; }
  .rarity-row-stat {
    display: flex; align-items: center; gap: 8px;
  }
  .rarity-row-stat .label { font-size: 0.72rem; min-width: 72px; }
  .rarity-row-bar { flex: 1; height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .rarity-row-fill { height: 100%; border-radius: 99px; transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1); }
  .rarity-row-count { font-size: 0.72rem; font-weight: 700; min-width: 20px; text-align: right; }

  .element-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .element-tag {
    padding: 4px 10px; border-radius: 99px; font-size: 0.7rem; font-weight: 700;
    border: 1px solid;
  }

  /* ===========================
     SHARE SYSTEM
  =========================== */
  .share-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,10,26,0.97);
    z-index: 130;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 20px 80px;
    overflow-y: auto;
    gap: 16px;
  }
  .share-overlay.show { display: flex; }

  .share-header {
    width: 100%; max-width: 380px;
    display: flex; align-items: center; gap: 10px;
  }
  .share-title {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.1rem; color: var(--accent2); flex: 1;
  }
  .share-close { font-size: 1.4rem; cursor: pointer; color: var(--text-dim); }

  /* The share card preview */
  .share-preview {
    width: 100%; max-width: 340px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  .share-preview canvas { width: 100%; display: block; }

  .share-actions {
    width: 100%; max-width: 340px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .share-btn {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    font-size: 0.95rem; font-weight: 900; cursor: pointer;
    font-family: inherit; transition: transform 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .share-btn:hover { transform: translateY(-2px); }
  .share-btn.download {
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    color: white; box-shadow: 0 4px 20px rgba(59,130,246,0.4);
  }
  .share-btn.native {
    background: linear-gradient(135deg, var(--accent1), #dc2626);
    color: white; box-shadow: 0 4px 20px rgba(255,107,53,0.4);
  }
  .share-btn.copy {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
  }
  .share-tip {
    font-size: 0.7rem; color: var(--text-dim); text-align: center; line-height: 1.5;
  }

  /* Share button in detail actions */
  .detail-share-btn {
    padding: 14px 18px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #f97316, #dc2626);
    color: white; font-size: 0.9rem; font-weight: 900;
    cursor: pointer; font-family: inherit; transition: transform 0.15s;
    flex-shrink: 0;
  }
  .detail-share-btn:hover { transform: translateY(-2px); }

  /* ===========================
     EVOLUTION CARD VISUALS
  =========================== */

  /* Evo1 - green glow frame */
  .coll-card.evo-1 {
    border-color: #34d399;
    box-shadow: 0 0 12px rgba(52,211,153,0.35), inset 0 0 20px rgba(52,211,153,0.06);
  }
  .coll-card.evo-1 .coll-img::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 8px;
    box-shadow: inset 0 0 12px rgba(52,211,153,0.4);
    pointer-events: none;
  }
  .coll-card.evo-1 .coll-img { position: relative; }

  /* Evo2 - rotating purple magic circle behind image */
  .coll-card.evo-2 {
    border-color: #c084fc;
    box-shadow: 0 0 18px rgba(192,132,252,0.45), inset 0 0 25px rgba(192,132,252,0.08);
  }
  .coll-card.evo-2 .coll-img {
    position: relative;
    overflow: visible;
  }
  .coll-card.evo-2 .coll-img::before {
    content: '';
    position: absolute; inset: -6px;
    border-radius: 50%;
    background: conic-gradient(transparent 60deg, rgba(192,132,252,0.6) 120deg, transparent 180deg, rgba(232,121,249,0.5) 240deg, transparent 300deg, rgba(192,132,252,0.4) 360deg);
    animation: evo2Spin 3s linear infinite;
    pointer-events: none; z-index: 0;
  }
  .coll-card.evo-2 .coll-img img { position: relative; z-index: 1; border-radius: 8px; }
  @keyframes evo2Spin { to { transform: rotate(360deg); } }

  /* Evo3 - gold shimmer + floating sparkles */
  .coll-card.evo-3 {
    border-color: #fbbf24;
    box-shadow: 0 0 25px rgba(251,191,36,0.6), 0 0 50px rgba(251,191,36,0.2), inset 0 0 30px rgba(251,191,36,0.08);
    animation: evo3CardPulse 2s ease-in-out infinite;
  }
  @keyframes evo3CardPulse {
    0%,100% { box-shadow: 0 0 25px rgba(251,191,36,0.6), 0 0 50px rgba(251,191,36,0.2); }
    50%     { box-shadow: 0 0 40px rgba(251,191,36,0.9), 0 0 80px rgba(255,107,53,0.4); }
  }
  .coll-card.evo-3 .coll-img {
    position: relative;
    overflow: hidden;
  }
  .coll-card.evo-3 .coll-img::before {
    content: '';
    position: absolute; inset: 0; z-index: 2;
    background: linear-gradient(120deg, transparent 20%, rgba(251,191,36,0.35) 50%, transparent 80%);
    background-size: 200% 100%;
    animation: evo3Shimmer 2s ease-in-out infinite;
    pointer-events: none; border-radius: 8px;
  }
  @keyframes evo3Shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .coll-card.evo-3 .coll-img img { position: relative; z-index: 1; border-radius: 8px; }
  /* Floating star particles on evo-3 cards */
  .coll-card.evo-3::after {
    content: '✦ ✧ ✦';
    position: absolute; bottom: 36px; left: 0; right: 0;
    text-align: center; font-size: 0.55rem; color: #fbbf24;
    animation: evo3Stars 2.5s ease-in-out infinite;
    pointer-events: none; letter-spacing: 4px; opacity: 0.8;
  }
  @keyframes evo3Stars {
    0%,100% { transform: translateY(0); opacity: 0.8; }
    50%     { transform: translateY(-4px); opacity: 1; }
  }

  /* === COLLECTION === */
  .collection-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .coll-card {
    background: var(--card);
    border-radius: 14px;
    padding: 12px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
  }
  .coll-card:hover { transform: scale(1.02); border-color: var(--accent3); }
  .coll-card.selected { border-color: var(--accent2); box-shadow: 0 0 15px rgba(251,191,36,0.3); }
  .coll-card .rarity-dot {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .coll-img { width: 100%; aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: white; margin-bottom: 8px; }
  .coll-img img { width: 100%; height: 100%; object-fit: cover; }
  .coll-name { font-size: 0.8rem; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .coll-badges { display: flex; gap: 4px; flex-wrap: wrap; }
  .mini-badge {
    font-size: 0.6rem;
    padding: 2px 6px;
    border-radius: 99px;
    background: rgba(124,58,237,0.3);
    color: #c084fc;
  }
  .coll-stats { display: flex; gap: 8px; margin-top: 6px; }
  .coll-stat { font-size: 0.65rem; color: var(--text-dim); }
  .coll-stat span { color: var(--text); font-weight: 700; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state .big { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.85rem; line-height: 1.6; }

  /* === BATTLE === */
  .party-section { margin-bottom: 20px; }
  .section-label {
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .party-slots {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .party-slot {
    aspect-ratio: 1;
    border-radius: 12px;
    border: 2px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
    overflow: hidden;
    background: var(--surface);
  }
  .party-slot:hover { border-color: var(--accent3); }
  .party-slot.filled { border-style: solid; border-color: var(--accent3); }
  .party-slot img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  .party-slot .slot-name {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.7);
    font-size: 0.55rem;
    text-align: center;
    padding: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .party-slot .remove-btn {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: rgba(255,0,0,0.7);
    font-size: 0.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .battle-start-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #dc2626, #ff6b35);
    color: white;
    font-size: 1rem;
    font-weight: 900;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 6px 25px rgba(220,38,38,0.4);
    transition: transform 0.15s;
    margin-top: 16px;
  }
  .battle-start-btn:hover { transform: translateY(-2px); }
  .battle-start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Battle screen */
  .battle-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #1a0a2e 0%, #0d1117 100%);
    z-index: 50;
    flex-direction: column;
    padding: 16px;
    overflow-y: auto;
  }
  .battle-screen.show { display: flex; }

  .battle-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .battle-title {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.1rem;
    color: var(--accent2);
  }
  .wave-badge {
    background: rgba(255,107,53,0.2);
    border: 1px solid var(--accent1);
    color: var(--accent1);
    padding: 4px 12px;
    border-radius: 99px;
    font-size: 0.75rem;
    font-weight: 700;
  }

  .battle-field {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .team-row {
    background: rgba(255,255,255,0.04);
    border-radius: 14px;
    padding: 12px;
    border: 1px solid var(--border);
  }
  .team-label { font-size: 0.65rem; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
  .fighters {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .fighter {
    text-align: center;
  }
  .fighter-img {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 10px;
    overflow: hidden;
    background: var(--surface);
    border: 2px solid var(--border);
    margin-bottom: 4px;
    position: relative;
  }
  .fighter-img img { width: 100%; height: 100%; object-fit: cover; }
  .fighter-img.dead { filter: grayscale(1) brightness(0.4); }
  .fighter-img.attacking {
    animation: attackAnim 0.3s ease-in-out;
    border-color: var(--accent1);
  }
  .fighter-img.hurt {
    animation: hurtAnim 0.3s ease-in-out;
    border-color: #dc2626;
  }
  @keyframes attackAnim {
    0%,100%{transform:translateX(0)}
    50%{transform:translateX(8px)}
  }
  @keyframes hurtAnim {
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-4px)}
    75%{transform:translateX(4px)}
  }
  .fighter-hp {
    width: 100%;
    height: 5px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 2px;
  }
  .fighter-hp-fill {
    height: 100%;
    background: linear-gradient(90deg, #22c55e, #86efac);
    border-radius: 99px;
    transition: width 0.5s;
  }
  .fighter-hp-fill.low { background: linear-gradient(90deg, #ef4444, #fca5a5); }
  .fighter-name { font-size: 0.55rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .vs-divider {
    text-align: center;
    font-family: 'Kaisei Decol', serif;
    font-size: 1.5rem;
    color: var(--accent1);
    text-shadow: 0 0 20px rgba(255,107,53,0.7);
    animation: vsPulse 1s ease-in-out infinite alternate;
  }
  @keyframes vsPulse {
    to { text-shadow: 0 0 30px rgba(255,107,53,1), 0 0 60px rgba(255,107,53,0.5); }
  }

  .battle-log {
    background: var(--surface);
    border-radius: 12px;
    padding: 12px;
    border: 1px solid var(--border);
    max-height: 120px;
    overflow-y: auto;
    margin-top: 8px;
  }
  .log-entry {
    font-size: 0.72rem;
    color: var(--text-dim);
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    animation: fadeIn 0.3s ease;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-entry.highlight { color: var(--accent2); font-weight: 700; }
  .log-entry.critical { color: var(--accent1); font-weight: 700; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

  .battle-result-banner {
    text-align: center;
    padding: 20px;
    font-family: 'Kaisei Decol', serif;
    font-size: 2rem;
    font-weight: 700;
    animation: dropIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .battle-result-banner.win { color: var(--accent2); text-shadow: 0 0 40px rgba(251,191,36,0.8); }
  .battle-result-banner.lose { color: #ef4444; text-shadow: 0 0 40px rgba(239,68,68,0.8); }

  .damage-popup {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.8rem;
    font-weight: 900;
    color: #fbbf24;
    pointer-events: none;
    animation: damageFloat 0.8s ease-out forwards;
    white-space: nowrap;
    z-index: 10;
  }
  @keyframes damageFloat {
    0% { transform: translateX(-50%) translateY(0); opacity: 1; }
    100% { transform: translateX(-50%) translateY(-30px); opacity: 0; }
  }

  /* Particles */
  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    animation: particleFly var(--dur, 1.5s) ease-out forwards;
    z-index: 103;
  }
  @keyframes particleFly {
    0% { transform: translate(0,0) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--rot,360deg)); opacity: 0; }
  }

  /* Star particle */
  .particle-star {
    position: fixed;
    pointer-events: none;
    font-size: var(--sz, 1rem);
    animation: starFall var(--dur, 2s) ease-in forwards;
    z-index: 103;
  }
  @keyframes starFall {
    0% { transform: translateY(var(--ty)) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Magic circle for EPIC */
  .magic-circle-epic {
    position: fixed;
    pointer-events: none;
    z-index: 102;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    animation: epicCircleIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both, epicCircleOut 0.5s ease-in 1.8s forwards;
  }
  @keyframes epicCircleIn {
    from { transform: translate(-50%,-50%) scale(0) rotate(-180deg); opacity: 0; }
    to   { transform: translate(-50%,-50%) scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes epicCircleOut {
    to { transform: translate(-50%,-50%) scale(2); opacity: 0; }
  }

  /* Shockwave for LEGENDARY */
  .shockwave {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%,-50%) scale(0);
    width: 100px; height: 100px;
    border-radius: 50%;
    border: 4px solid var(--legendary);
    pointer-events: none;
    z-index: 102;
    animation: shockwaveExpand 0.8s ease-out forwards;
  }
  @keyframes shockwaveExpand {
    0%  { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    100%{ transform: translate(-50%,-50%) scale(12); opacity: 0; }
  }

  /* Screen shake for LEGENDARY */
  @keyframes screenShake {
    0%,100%{ transform: translate(0,0) rotate(0deg); }
    10%{ transform: translate(-6px, -3px) rotate(-0.5deg); }
    20%{ transform: translate(6px, 3px) rotate(0.5deg); }
    30%{ transform: translate(-4px, 5px) rotate(-0.3deg); }
    40%{ transform: translate(4px, -5px) rotate(0.3deg); }
    50%{ transform: translate(-3px, 2px) rotate(-0.2deg); }
    60%{ transform: translate(3px, -2px) rotate(0.2deg); }
    70%{ transform: translate(-2px, 3px) rotate(-0.1deg); }
    80%{ transform: translate(2px, 1px) rotate(0.1deg); }
    90%{ transform: translate(-1px,-1px); }
  }
  .shake { animation: screenShake 0.6s ease-in-out; }

  /* UNCOMMON glow ring */
  .uncommon-ring {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%,-50%) scale(0);
    width: 80vw; height: 80vw;
    max-width: 400px; max-height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(52,211,153,0.25) 0%, transparent 70%);
    pointer-events: none;
    z-index: 102;
    animation: ringExpand 1s ease-out forwards;
  }
  @keyframes ringExpand {
    0%  { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    60% { opacity: 0.8; }
    100%{ transform: translate(-50%,-50%) scale(1); opacity: 0; }
  }

  /* RARE beam streaks */
  .beam {
    position: fixed;
    left: 50%; top: 50%;
    width: 2px;
    height: 60vh;
    transform-origin: 50% 100%;
    pointer-events: none;
    z-index: 102;
    animation: beamFlash 0.8s ease-out forwards;
  }
  @keyframes beamFlash {
    0%  { opacity: 1; transform: translateX(-50%) rotate(var(--angle)) scaleY(0); }
    30% { opacity: 1; transform: translateX(-50%) rotate(var(--angle)) scaleY(1); }
    100%{ opacity: 0; transform: translateX(-50%) rotate(var(--angle)) scaleY(1); }
  }

  /* Result overlay rarity backgrounds */
  .result-overlay.rarity-COMMON    { background: rgba(10,10,26,0.95); }
  .result-overlay.rarity-UNCOMMON  { background: linear-gradient(180deg, rgba(5,30,20,0.97) 0%, rgba(10,10,26,0.97) 100%); }
  .result-overlay.rarity-RARE      { background: linear-gradient(180deg, rgba(5,15,40,0.97) 0%, rgba(10,10,26,0.97) 100%); }
  .result-overlay.rarity-EPIC      { background: linear-gradient(180deg, rgba(25,5,50,0.97) 0%, rgba(10,10,26,0.97) 100%); }
  .result-overlay.rarity-LEGENDARY { background: linear-gradient(180deg, rgba(40,25,0,0.97) 0%, rgba(10,10,26,0.97) 100%); }

  /* Card border per rarity */
  .char-card.rarity-COMMON   { border-color: var(--common); }
  .char-card.rarity-UNCOMMON { border-color: var(--uncommon); box-shadow: 0 0 20px rgba(52,211,153,0.2); }
  .char-card.rarity-RARE     { border-color: var(--rare); box-shadow: 0 0 25px rgba(96,165,250,0.3); }
  .char-card.rarity-EPIC     { border-color: var(--epic); box-shadow: 0 0 35px rgba(192,132,252,0.4); }
  .char-card.rarity-LEGENDARY{
    border-color: var(--legendary);
    box-shadow: 0 0 50px rgba(251,191,36,0.6), 0 0 100px rgba(251,191,36,0.2);
    animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.5s both, legendaryCardPulse 2s ease-in-out 1.5s infinite;
  }
  @keyframes legendaryCardPulse {
    0%,100%{ box-shadow: 0 0 50px rgba(251,191,36,0.6), 0 0 100px rgba(251,191,36,0.2); }
    50%    { box-shadow: 0 0 70px rgba(251,191,36,0.9), 0 0 140px rgba(251,191,36,0.4); }
  }

  /* Char image border per rarity */
  .char-img-wrap.rarity-UNCOMMON { border-color: var(--uncommon); }
  .char-img-wrap.rarity-RARE     { border-color: var(--rare); box-shadow: 0 0 12px rgba(96,165,250,0.5); }
  .char-img-wrap.rarity-EPIC     { border-color: var(--epic); box-shadow: 0 0 16px rgba(192,132,252,0.6); }
  .char-img-wrap.rarity-LEGENDARY{
    border-color: var(--legendary);
    box-shadow: 0 0 20px rgba(251,191,36,0.8);
    animation: imgGlow 1.5s ease-in-out infinite alternate;
  }
  @keyframes imgGlow {
    to { box-shadow: 0 0 35px rgba(251,191,36,1), 0 0 60px rgba(255,107,53,0.5); }
  }

  /* Rarity banner entry animations */
  .rarity-banner.rarity-COMMON   { animation: dropIn 0.4s ease both 0.2s; }
  .rarity-banner.rarity-UNCOMMON { animation: dropIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both 0.3s; }
  .rarity-banner.rarity-RARE     { animation: rareBannerIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both 0.2s; }
  .rarity-banner.rarity-EPIC     { animation: epicBannerIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both 0.3s; }
  .rarity-banner.rarity-LEGENDARY{ animation: legendaryBannerIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both 0.4s, legendaryPulse 2s ease-in-out 1.5s infinite; }

  @keyframes rareBannerIn {
    from { transform: scale(3) translateY(-20px); opacity: 0; filter: blur(8px); }
    to   { transform: scale(1) translateY(0); opacity: 1; filter: blur(0); }
  }
  @keyframes epicBannerIn {
    from { transform: scale(0) rotate(-20deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes legendaryBannerIn {
    0%  { transform: scale(0) rotate(15deg); opacity: 0; filter: brightness(5); }
    60% { transform: scale(1.2) rotate(-3deg); opacity: 1; filter: brightness(2); }
    100%{ transform: scale(1) rotate(0deg); opacity: 1; filter: brightness(1); }
  }

  /* Stage Map */
  .stage-map { margin-bottom: 16px; }
  .stage-map-title { font-size: 0.72rem; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .stages { display: flex; flex-direction: column; gap: 6px; }

  .stage-row {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .stage-connector {
    width: 2px;
    height: 20px;
    background: var(--border);
    margin-left: 24px;
  }
  .stage-connector.cleared { background: linear-gradient(180deg, #34d399, #22c55e); }

  .stage-card {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .stage-card:hover:not(.locked) { border-color: var(--accent3); transform: translateX(3px); }
  .stage-card.locked { opacity: 0.45; cursor: not-allowed; }
  .stage-card.cleared { border-color: #34d399; }
  .stage-card.boss-stage { border-color: #ef4444; background: rgba(239,68,68,0.07); }
  .stage-card.boss-stage:hover:not(.locked) { border-color: #ff6b35; box-shadow: 0 0 20px rgba(239,68,68,0.3); }
  .stage-card.selected-stage { border-color: var(--accent2); box-shadow: 0 0 15px rgba(251,191,36,0.3); }

  .stage-num {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
    background: var(--surface);
    border: 2px solid var(--border);
    font-weight: 900;
  }
  .stage-card.boss-stage .stage-num { background: rgba(239,68,68,0.2); border-color: #ef4444; }
  .stage-card.cleared .stage-num { background: rgba(52,211,153,0.2); border-color: #34d399; }

  .stage-info { flex: 1; min-width: 0; }
  .stage-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 2px; }
  .stage-desc { font-size: 0.65rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stage-enemies { display: flex; gap: 4px; margin-top: 4px; }
  .enemy-pip { font-size: 0.75rem; }

  .stage-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .stage-badge {
    font-size: 0.6rem; font-weight: 700;
    padding: 2px 7px; border-radius: 99px;
  }
  .stage-badge.boss { background: rgba(239,68,68,0.25); color: #f87171; border: 1px solid #ef4444; }
  .stage-badge.clear { background: rgba(52,211,153,0.2); color: #34d399; border: 1px solid #34d399; }
  .stage-badge.new { background: rgba(251,191,36,0.2); color: var(--accent2); border: 1px solid var(--accent2); animation: newPulse 1.5s ease-in-out infinite; }
  @keyframes newPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* Weakness hint panel */
  .weakness-panel {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.35);
    border-radius: 12px;
    padding: 10px 14px;
    margin-top: 8px;
    display: none;
  }
  .weakness-panel.show { display: block; }
  .weakness-title { font-size: 0.7rem; color: #f87171; font-weight: 700; margin-bottom: 6px; }
  .weakness-rows { display: flex; flex-direction: column; gap: 4px; }
  .weakness-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.68rem; color: var(--text-dim);
  }
  .weakness-icon { font-size: 0.9rem; }
  .weakness-text b { color: var(--text); }

  /* Boss HP bar special */
  .boss-hp-wrap {
    margin: 8px 0;
    display: none;
  }
  .boss-hp-wrap.show { display: block; }
  .boss-hp-label { font-size: 0.65rem; color: #f87171; margin-bottom: 4px; display: flex; justify-content: space-between; }
  .boss-hp-bar { height: 10px; background: var(--border); border-radius: 99px; overflow: hidden; border: 1px solid rgba(239,68,68,0.4); }
  .boss-hp-fill {
    height: 100%;
    background: linear-gradient(90deg, #ef4444, #ff6b35, #fbbf24);
    border-radius: 99px;
    transition: width 0.6s;
    box-shadow: 0 0 8px rgba(239,68,68,0.6);
  }

  /* Boss entry animation */
  .boss-entry-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,10,26,0.92);
    z-index: 60;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .boss-entry-overlay.show { display: flex; }
  .boss-entry-icon { font-size: 5rem; animation: bossEntryIcon 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes bossEntryIcon {
    from { transform: scale(0) rotate(-20deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .boss-entry-name {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.8rem; font-weight: 700;
    color: #ef4444;
    text-shadow: 0 0 30px rgba(239,68,68,0.8);
    animation: bossEntryName 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  }
  @keyframes bossEntryName {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .boss-entry-sub { font-size: 0.8rem; color: var(--text-dim); animation: bossEntryName 0.5s ease 0.5s both; }

  /* Stage clear banner */
  .stage-clear-banner {
    text-align: center;
    padding: 12px 20px;
    background: linear-gradient(135deg, rgba(52,211,153,0.15), rgba(34,197,94,0.15));
    border: 1px solid #34d399;
    border-radius: 12px;
    margin-bottom: 8px;
    display: none;
  }
  .stage-clear-banner.show { display: block; animation: dropIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
  .stage-clear-banner .clear-title { font-family: 'Kaisei Decol', serif; font-size: 1.3rem; color: #34d399; }
  .stage-clear-banner .clear-sub { font-size: 0.72rem; color: var(--text-dim); margin-top: 4px; }

  /* ===========================
     REWARD SYSTEM
     =========================== */

  /* Point display in header */
  .point-display {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin: 0 0 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 16px;
  }
  .point-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 700; }
  .point-icon { font-size: 1rem; }
  .point-val { color: var(--accent2); }

  /* Draw section point display */
  .draw-points-bar {
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 7px 12px;
    margin-bottom: 12px;
    font-size: 0.75rem;
  }
  .draw-pts-item { display: flex; align-items: center; gap: 4px; }
  .draw-pts-item .val { color: var(--accent2); font-weight: 700; }
  .use-point-btn {
    margin-left: auto;
    padding: 4px 10px;
    border-radius: 8px;
    border: 1px solid var(--accent3);
    background: rgba(124,58,237,0.2);
    color: #c084fc;
    font-size: 0.7rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }

  /* Reward drop overlay */
  .reward-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,10,26,0.96);
    z-index: 110;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 30px 20px;
    overflow-y: auto;
    gap: 16px;
  }
  .reward-overlay.show { display: flex; }

  .reward-title {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent2);
    text-shadow: 0 0 30px rgba(251,191,36,0.7);
    animation: dropIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    text-align: center;
  }
  .reward-sub { font-size: 0.75rem; color: var(--text-dim); text-align: center; margin-top: -8px; }

  .reward-sections { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 12px; }

  /* Point reward card */
  .reward-card {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1) var(--delay, 0.1s) both;
  }
  .reward-card-title { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
  .reward-points-row { display: flex; gap: 10px; }
  .reward-point-item {
    flex: 1;
    background: var(--surface);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .reward-point-icon { font-size: 1.6rem; margin-bottom: 4px; }
  .reward-point-name { font-size: 0.65rem; color: var(--text-dim); margin-bottom: 4px; }
  .reward-point-val { font-size: 1.1rem; font-weight: 900; color: var(--accent2); }
  .reward-point-val.new { animation: countUp 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes countUp { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* Drop item card */
  .drop-card {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  }
  .drop-card-title { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
  .drop-items { display: flex; flex-direction: column; gap: 8px; }
  .drop-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface);
    border-radius: 10px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1) var(--di, 0.4s) both;
    position: relative; overflow: hidden;
  }
  .drop-item::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--item-color, rgba(251,191,36,0.1)), transparent);
    pointer-events: none;
  }
  .drop-item-icon { font-size: 1.8rem; flex-shrink: 0; }
  .drop-item-info { flex: 1; }
  .drop-item-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 2px; }
  .drop-item-desc { font-size: 0.68rem; color: var(--text-dim); }
  .drop-item-rarity {
    font-size: 0.62rem; font-weight: 700;
    padding: 2px 8px; border-radius: 99px;
  }
  .drop-rarity-COMMON   { background: rgba(156,163,175,0.2); color: var(--common); border: 1px solid var(--common); }
  .drop-rarity-UNCOMMON { background: rgba(52,211,153,0.2); color: var(--uncommon); border: 1px solid var(--uncommon); }
  .drop-rarity-RARE     { background: rgba(96,165,250,0.2); color: var(--rare); border: 1px solid var(--rare); }
  .drop-rarity-EPIC     { background: rgba(192,132,252,0.2); color: var(--epic); border: 1px solid var(--epic); }
  .drop-rarity-LEGENDARY{ background: rgba(251,191,36,0.2); color: var(--legendary); border: 1px solid var(--legendary); }
  .drop-item-new {
    position: absolute; top: 6px; right: 6px;
    font-size: 0.6rem; font-weight: 700;
    background: var(--accent1); color: white;
    padding: 2px 6px; border-radius: 99px;
  }
  .no-drop {
    text-align: center; color: var(--text-dim); font-size: 0.78rem; padding: 12px;
  }

  /* Level up cards inside reward */
  .levelup-items { display: flex; flex-direction: column; gap: 6px; }
  .levelup-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border-radius: 10px; padding: 8px 12px;
    border: 1px solid rgba(251,191,36,0.4);
    animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1) var(--li, 0.5s) both;
  }
  .levelup-img { width: 36px; height: 36px; border-radius: 8px; overflow: hidden; background: white; flex-shrink: 0; }
  .levelup-img img { width: 100%; height: 100%; object-fit: cover; }
  .levelup-info { flex: 1; }
  .levelup-name { font-size: 0.8rem; font-weight: 700; }
  .levelup-badge {
    display: inline-block; margin-top: 3px;
    font-size: 0.65rem; font-weight: 700;
    background: rgba(251,191,36,0.2); color: var(--accent2);
    border: 1px solid var(--accent2); border-radius: 99px; padding: 2px 8px;
  }
  .stat-up-row { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .stat-up-chip {
    font-size: 0.6rem; background: rgba(34,197,94,0.15);
    color: #34d399; border: 1px solid rgba(34,197,94,0.4);
    border-radius: 99px; padding: 1px 6px;
  }

  /* Inventory screen */
  .inventory-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,10,26,0.97);
    z-index: 90;
    flex-direction: column;
    padding: 20px 16px;
    overflow-y: auto;
  }
  .inventory-overlay.show { display: flex; }
  .inv-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .inv-title { font-family: 'Kaisei Decol', serif; font-size: 1.2rem; color: var(--accent2); flex: 1; }
  .inv-close { font-size: 1.4rem; cursor: pointer; color: var(--text-dim); }
  .inv-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .inv-tab {
    padding: 6px 14px; border-radius: 99px; font-size: 0.75rem; font-weight: 700;
    border: 1px solid var(--border); background: var(--surface); color: var(--text-dim); cursor: pointer;
    font-family: inherit;
  }
  .inv-tab.active { background: var(--accent3); border-color: var(--accent3); color: white; }
  .inv-items { display: flex; flex-direction: column; gap: 8px; }
  .inv-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border-radius: 12px; padding: 12px 14px;
    border: 1px solid var(--border); cursor: pointer; transition: border-color 0.15s;
  }
  .inv-item:hover { border-color: var(--accent3); }
  .inv-item-icon { font-size: 2rem; }
  .inv-item-info { flex: 1; }
  .inv-item-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 3px; }
  .inv-item-desc { font-size: 0.68rem; color: var(--text-dim); }
  .inv-item-count {
    font-size: 0.75rem; font-weight: 700; color: var(--accent2);
    background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3);
    border-radius: 8px; padding: 4px 8px; min-width: 36px; text-align: center;
  }
  .inv-empty { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 0.85rem; }

  /* Point shop section on draw tab */
  .point-shop {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-top: 12px;
  }
  .point-shop-title { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
  .shop-items { display: flex; flex-direction: column; gap: 8px; }
  .shop-item {
    display: flex; align-items: center; gap: 10px;

  /* Level up flash overlay */
  .levelup-flash {

  .levelup-flash.show { display: flex; animation: lvFlash 1.2s ease-out forwards; }
  @keyframes lvFlash {
    0%  { background: rgba(251,191,36,0.0); }

  @keyframes levelupBounce {

  /* ===========================
     CHARACTER DETAIL SCREEN
     =========================== */
  .char-detail-overlay {
    display: none;
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 80;
    flex-direction: column;
    overflow-y: auto;

  .detail-hero {
    position: relative;
    width: 100%;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 20px;

  .detail-bg {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, #1a0a2e 0%, var(--bg) 100%);

  .detail-bg-glow {
    position: absolute; inset: 0;
    opacity: 0.4;
    transition: all 0.5s;
  }

  .detail-back {
    position: absolute; top: 16px; left: 16px;
    font-size: 1.4rem; cursor: pointer; color: var(--text-dim);

  }
  .detail-equip-btn {
    position: absolute; top: 16px; right: 16px;
    background: rgba(124,58,237,0.3); border: 1px solid var(--accent3);
    color: #c084fc; font-size: 0.72rem; font-weight: 700;
    padding: 5px 10px; border-radius: 8px; cursor: pointer; z-index: 2;
    font-family: inherit;
  }

  .detail-img-wrap {
    position: relative; z-index: 2;
    width: 130px; height: 130px;
    border-radius: 20px; overflow: hidden;
    background: white;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .detail-img-wrap img { width: 100%; height: 100%; object-fit: cover; }

  /* Evolution aura layers */
  .evo-aura {
    position: absolute; inset: -4px;
    border-radius: 24px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .evo-aura.evo-1 {
    border: 3px solid var(--uncommon);
    box-shadow: 0 0 20px rgba(52,211,153,0.6), inset 0 0 20px rgba(52,211,153,0.2);
    animation: aura1Pulse 2s ease-in-out infinite;
    opacity: 0;
  }
  .evo-aura.evo-2 {
    border: 3px solid var(--epic);
    box-shadow: 0 0 30px rgba(192,132,252,0.8), inset 0 0 30px rgba(192,132,252,0.3);
    animation: aura2Pulse 1.5s ease-in-out infinite;
    opacity: 0;
  }
  .evo-aura.evo-3 {
    border: 3px solid var(--legendary);
    box-shadow: 0 0 40px rgba(251,191,36,1), inset 0 0 40px rgba(251,191,36,0.4);
    animation: aura3Pulse 1s ease-in-out infinite;
    opacity: 0;
  }
  @keyframes aura1Pulse { 0%,100%{box-shadow:0 0 15px rgba(52,211,153,0.5)} 50%{box-shadow:0 0 30px rgba(52,211,153,0.9)} }
  @keyframes aura2Pulse { 0%,100%{box-shadow:0 0 20px rgba(192,132,252,0.6)} 50%{box-shadow:0 0 50px rgba(192,132,252,1)} }
  @keyframes aura3Pulse { 0%,100%{box-shadow:0 0 30px rgba(251,191,36,0.8),0 0 60px rgba(255,107,53,0.4)} 50%{box-shadow:0 0 60px rgba(251,191,36,1),0 0 120px rgba(255,107,53,0.7)} }

  .detail-name-row {
    position: relative; z-index: 2;
    text-align: center; margin-top: 12px;
  }
  .detail-name {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.5rem; font-weight: 700;
  }
  .detail-sub-row {
    display: flex; gap: 6px; justify-content: center; margin-top: 6px; flex-wrap: wrap;
  }

  /* EXP bar in detail */
  .detail-exp-wrap {
    position: relative; z-index: 2;
    width: 200px; margin-top: 10px;
  }
  .detail-exp-label { font-size: 0.65rem; color: var(--text-dim); text-align: center; margin-bottom: 4px; }
  .detail-exp-bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .detail-exp-fill { height: 100%; background: linear-gradient(90deg, var(--accent3), var(--accent2)); border-radius: 99px; transition: width 0.5s; }

  .detail-body { padding: 0 16px 80px; display: flex; flex-direction: column; gap: 14px; }

  /* Stats section */
  .detail-section-title { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }

  .detail-stats-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .detail-stat {
    background: var(--card); border-radius: 10px; padding: 8px 10px;
    border: 1px solid var(--border); text-align: center;
  }
  .detail-stat-label { font-size: 0.6rem; color: var(--text-dim); margin-bottom: 2px; }
  .detail-stat-val { font-size: 1rem; font-weight: 900; }

  /* Equipment slots */
  .equip-slots { display: flex; gap: 10px; }
  .equip-slot {
    flex: 1; background: var(--card); border-radius: 12px;
    border: 2px dashed var(--border); padding: 12px 10px;
    text-align: center; cursor: pointer; transition: border-color 0.15s;
    position: relative;
  }
  .equip-slot:hover { border-color: var(--accent3); }
  .equip-slot.filled { border-style: solid; border-color: var(--accent3); }
  .equip-slot-icon { font-size: 1.8rem; margin-bottom: 4px; }
  .equip-slot-name { font-size: 0.65rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .equip-slot-rarity { font-size: 0.55rem; color: var(--text-dim); margin-top: 2px; }
  .equip-slot-empty { font-size: 0.68rem; color: var(--text-dim); }
  .equip-remove {
    position: absolute; top: 4px; right: 4px;
    width: 16px; height: 16px; border-radius: 50%;
    background: rgba(239,68,68,0.7); font-size: 0.55rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  /* Skills display */
  .detail-skills { display: flex; flex-direction: column; gap: 6px; }

  /* Evolution section */
  .evo-section {
    background: var(--card); border-radius: 14px;
    border: 1px solid var(--border); padding: 14px;
  }
  .evo-progress { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .evo-stage {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; border: 2px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .evo-stage.reached { border-color: var(--uncommon); background: rgba(52,211,153,0.15); }
  .evo-stage.reached.evo2 { border-color: var(--epic); background: rgba(192,132,252,0.15); }
  .evo-stage.reached.evo3 { border-color: var(--legendary); background: rgba(251,191,36,0.15); }
  .evo-line { flex: 1; height: 2px; background: var(--border); border-radius: 99px; }
  .evo-line.filled { background: linear-gradient(90deg, var(--uncommon), var(--epic)); }

  .evo-btn {
    width: 100%; padding: 12px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #34d399, #059669);
    color: white; font-size: 0.9rem; font-weight: 900;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 20px rgba(52,211,153,0.4);
    transition: transform 0.15s;
  }
  .evo-btn:hover { transform: translateY(-2px); }
  .evo-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none;
    background: var(--surface); box-shadow: none; }

  /* Equip picker modal */
  .equip-picker {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,10,26,0.96);
    z-index: 90;
    flex-direction: column;
    padding: 20px 16px;
    overflow-y: auto;
  }
  .equip-picker.show { display: flex; }
  .equip-picker-title { font-family: 'Kaisei Decol', serif; font-size: 1.1rem; color: var(--accent2); margin-bottom: 4px; }
  .equip-picker-sub { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 14px; }
  .equip-picker-items { display: flex; flex-direction: column; gap: 8px; }
  .equip-picker-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border-radius: 12px; padding: 12px 14px;
    border: 1px solid var(--border); cursor: pointer; transition: border-color 0.15s;
  }
  .equip-picker-item:hover { border-color: var(--accent3); }
  .equip-picker-item.equipped { border-color: var(--accent2); opacity: 0.5; pointer-events: none; }
  .equip-none-btn {
    padding: 12px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-dim);
    font-size: 0.85rem; font-weight: 700; cursor: pointer; font-family: inherit;
    text-align: center; margin-top: 8px;
  }

  /* Evolution animation overlay */
  .evo-anim-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,10,26,0.97);
    z-index: 120;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .evo-anim-overlay.show { display: flex; }
  .evo-anim-img {
    width: 160px; height: 160px;
    border-radius: 24px; overflow: hidden; background: white;
    position: relative;
  }
  .evo-anim-img img { width: 100%; height: 100%; object-fit: cover; }
  .evo-anim-ring {
    position: absolute; inset: -8px; border-radius: 32px;
    animation: evoRingGrow 2s ease-out forwards;
    border: 4px solid var(--uncommon);
  }
  @keyframes evoRingGrow {
    0%  { transform: scale(0.5); opacity: 0; box-shadow: 0 0 0 rgba(52,211,153,0); }
    50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 60px rgba(52,211,153,0.8); }
    100%{ transform: scale(1); opacity: 1; }
  }
  .evo-anim-text {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.8rem; font-weight: 700;
    animation: evoTextIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.8s both;
  }
  @keyframes evoTextIn {
    from { transform: scale(0) rotate(-10deg); opacity: 0; }
    to   { transform: scale(1) rotate(0); opacity: 1; }
  }
  .evo-anim-sub { font-size: 0.8rem; color: var(--text-dim); animation: evoTextIn 0.5s ease 1.2s both; }

  /* Detail bottom action bar - only visible inside detail overlay */
  .char-detail-overlay .detail-actions {
    position: sticky;
    bottom: 0;
    background: linear-gradient(180deg, transparent, var(--bg) 40%);
    padding: 16px;
    display: flex;
    gap: 10px;
    z-index: 85;
    margin-top: auto;
  }
  .detail-party-btn {
    flex: 1; padding: 14px; border-radius: 12px; border: none;
    font-size: 0.9rem; font-weight: 900; cursor: pointer; font-family: inherit;
    transition: transform 0.15s;
  }
  .detail-party-btn:hover { transform: translateY(-2px); }
  .detail-party-btn.add {
    background: linear-gradient(135deg, var(--accent3), #9f1de8);
    color: white; box-shadow: 0 4px 20px rgba(124,58,237,0.4);
  }
  .detail-party-btn.remove {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
  }

  /* Evolution levels constants */
  /* Lv10 = Evo1 (green aura), Lv20 = Evo2 (purple aura), Lv30 = Evo3 (gold aura) */
  .coll-evo-badge {
    position: absolute; bottom: 6px; left: 6px;
    font-size: 0.6rem; font-weight: 700; padding: 2px 6px;
    border-radius: 99px;
  }

  .synergy-banner {
    background: linear-gradient(135deg, rgba(251,191,36,0.15), rgba(255,107,53,0.15));
    border: 1px solid rgba(251,191,36,0.4);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 0.72rem;
    color: var(--accent2);
    margin-top: 8px;
    text-align: center;
    display: none;

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
/* 起動画面 */
.splash-screen {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  background: #000;
}
.splash-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  opacity: 0.7;
}
.splash-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.5);
}
.splash-content {
  position: relative; z-index: 10;
  text-align: center; padding: 2rem;
  width: 100%;
}
.splash-logo {
  font-size: clamp(2rem, 8vw, 4rem);
  font-weight: 900; letter-spacing: 0.05em;
  color: #fff;
  text-shadow: 0 0 30px rgba(255,107,53,0.8), 2px 2px 0 rgba(0,0,0,0.5);
  animation: splashPulse 2s ease-in-out infinite;
  margin-bottom: 0.5rem;
}
.splash-sub {
  font-size: 1.2rem; color: #ffd700; font-weight: 700;
  letter-spacing: 0.1em; margin-bottom: 2.5rem;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}
.splash-buttons { display: flex; flex-direction: column; gap: 1rem; align-items: center; }
.splash-btn {
  padding: 0.9rem 2.5rem; border-radius: 50px; border: none;
  font-size: 1rem; font-weight: 700; cursor: pointer;
  min-width: 240px; transition: transform 0.2s, box-shadow 0.2s;
}
.splash-btn:active { transform: scale(0.97); }
.splash-btn.primary {
  background: linear-gradient(135deg, #ff6b35, #ff0055);
  color: white; box-shadow: 0 4px 20px rgba(255,107,53,0.5);
}
.splash-btn.secondary {
  background: rgba(255,255,255,0.15);
  color: white; border: 2px solid rgba(255,255,255,0.4);
  backdrop-filter: blur(10px);
}
.splash-loading { color: rgba(255,255,255,0.6); font-size: 0.9rem; animation: splashPulse 1.5s ease-in-out infinite; }
@keyframes splashPulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* バトル演出 */
.battle-splash {
  position: fixed; inset: 0; z-index: 8888;
  display: flex; align-items: center; justify-content: center;
  background: #000;
}
.battle-splash-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  opacity: 0.7;
}
.battle-splash-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.4);
}
.battle-splash-vs {
  position: relative; z-index: 1;
  font-size: clamp(5rem, 20vw, 10rem);
  font-weight: 900; color: #ff0055;
  text-shadow: 0 0 40px #ff0055, 0 0 80px #ff6b35, 4px 4px 0 #000;
  animation: vsAnim 0.5s ease-out;
}
@keyframes vsAnim {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  60% { transform: scale(1.2) rotate(5deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
